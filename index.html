<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Springer-Dispo Pro v51.0</title>
    <style>
        :root{ --blue:#2563eb; --green:#16a34a; --red:#dc2626; --orange:#f59e0b; --bg:#f8fafc; }
        body{margin:0;padding:20px;font-family:'Segoe UI',sans-serif;background:var(--bg);}
        .card{max-width:900px;margin:auto;background:#fff;padding:25px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1);}
        .row{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:15px;}
        input, select, button{width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;font-size:1rem;}
        button{background:var(--blue);color:#fff;font-weight:bold;cursor:pointer;border:none;}
        .log{margin-top:15px;padding:12px;background:#1e293b;color:#4ade80;border-radius:10px;font-family:monospace;font-size:0.8rem;white-space:pre-wrap;max-height:150px;overflow-y:auto;}
        .driver{background:#fff;padding:15px;border-radius:15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 10px rgba(0,0,0,0.03);border-left:6px solid #ccc;}
        .all-free{border-left-color:var(--green);}
        .part-free{border-left-color:var(--orange);}
        .full-busy{border-left-color:var(--red);opacity:0.7;}
        .day-strip{display:flex;gap:5px;margin-top:8px;}
        .day-box{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:bold;color:#fff;}
        .day-free{background:var(--green);}
        .day-busy{background:var(--red);}
    </style>
</head>
<body>

<div class="card">
    <h2>Springer-Dispo Pro v51.0</h2>
    <div class="row">
        <div><label>Start-PLZ</label><input id="startPlz" value="30159"></div>
        <div><label>Einrichtung</label>
            <select id="schoolSelect" onchange="document.getElementById('startPlz').value=this.value">
                <option value="30159">-- Bitte wählen --</option>
                <option value="30655">Albert-Liebmann-Schule</option>
                <option value="30853">Gutzmann Schule</option>
            </select>
        </div>
    </div>
    <div class="row">
        <div><label>Von</label><input type="date" id="dateFrom" value="2026-04-27"></div>
        <div><label>Bis</label><input type="date" id="dateTo" value="2026-04-30"></div>
    </div>
    <button onclick="run()">Abfrage starten</button>
    <div id="log" class="log">Bereit für die Analyse...</div>
</div>

<div id="results" style="max-width:900px;margin:20px auto;"></div>

<script>
const drivers = [
    {name:"Aschenbach André",plz:"30989"},{name:"Ohm Lars",plz:"30559"},{name:"Bachmeier Reinhard",plz:"30659"},
    {name:"Isfahan Mozaffaey Hamid",plz:"30519"},{name:"Otto Alexander",plz:"30173"},{name:"Türkel Tuncer",plz:"30161"},
    {name:"Schrader Harald",plz:"30880"},{name:"Neubauer Michael",plz:"30853"},{name:"Ferkau Eckart",plz:"30851"},
    {name:"Bethmann Ekkehard",plz:"31535"},{name:"Hauer Frank",plz:"30900"},{name:"Kruse Jens Roland",plz:"31275"},
    {name:"Grimpe Dirk",plz:"30827"},{name:"Häge Klaus Dieter",plz:"30519"},{name:"Von Treskow Albrecht",plz:"30659"},
    {name:"Giuseppe Caruso",plz:"30880"},{name:"Popescu Viorel Florinel",plz:"30827"},{name:"Beka Jonel",plz:"31275"},
    {name:"Moser Siegfried",plz:"30827"},{name:"Bodewell Thomas",plz:"30853"}
];

async function run(){
    const kKey=localStorage.getItem("kKey"), kIds=localStorage.getItem("kIds"), gKey=localStorage.getItem("gKey");
    if(!kKey || !kIds || !gKey) return alert("Setup fehlt!");
    
    const logger = document.getElementById("log");
    const from = document.getElementById("dateFrom").value;
    const to = document.getElementById("dateTo").value;
    logger.innerHTML = "⏳ Analyse gestartet...\n";

    // 1. Kalenderdaten laden
    let allEvents = [];
    try {
        for(const id of kIds.split(",")){
            const url=`https://api.kalender.digital/public/event?calendarId=${id.trim()}&startDate=${from}&endDate=${to}T23:59:59`;
            const r = await fetch("https://corsproxy.io/?" + encodeURIComponent(url), {headers:{"X-API-KEY":kKey}});
            const data = await r.json();
            allEvents.push(...(data.events || data || []));
        }
    } catch(e) { logger.innerHTML += "❌ Fehler beim Laden der Kalender.\n"; }

    // 2. Tage generieren
    let days = [];
    let cur = new Date(from);
    let endDateObj = new Date(to);
    while(cur <= endDateObj){ days.push(cur.toISOString().split('T')[0]); cur.setDate(cur.getDate()+1); }

    // 3. Matrix Berechnung (Claude-Logik integriert)
    let ranking = drivers.map(d => {
        // Namens-Teile für robusteren Check
        const nameParts = d.name.toLowerCase().split(" ");
        const lastName = nameParts[0]; // z.B. Bachmeier
        const firstName = nameParts[1] || ""; // z.B. Reinhard

        const states = days.map(day => {
            const dayStart = new Date(day + "T00:00:00").getTime();
            const dayEnd = new Date(day + "T23:59:59").getTime();

            const ev = allEvents.find(e => {
                const title = (e.title || "").toLowerCase();
                const sub = (e.subCalendars || []).join(" ").toLowerCase();
                
                // Stabiler Datumscheck
                const evStart = new Date(e.startDate.replace(" ", "T")).getTime();
                const evEnd = new Date(e.endDate.replace(" ", "T")).getTime();
                const inRange = (evStart <= dayEnd && evEnd >= dayStart);

                // Namensmatch: Entweder Nachname + Vorname kommen im Text vor oder Unterkalender passt
                const nameMatch = title.includes(lastName) || sub.includes(lastName);
                return inRange && nameMatch;
            });
            return { day, busy: !!ev, title: ev ? ev.title : "Frei" };
        });

        const freeCount = states.filter(s => !s.busy).length;
        return { ...d, states, freeCount };
    });

    // Sortierung
    ranking.sort((a,b) => b.freeCount - a.freeCount);
    
    // 4. Anzeige
    document.getElementById("results").innerHTML = ranking.map(d => `
        <div class="driver ${d.freeCount==days.length?'all-free':(d.freeCount==0?'full-busy':'part-free')}">
            <div>
                <strong>${d.name}</strong>
                <div class="day-strip">
                    ${d.states.map(s => `<div class="day-box ${s.busy?'day-busy':'day-free'}" title="${s.title}">${s.day.split("-")[2]}</div>`).join("")}
                </div>
            </div>
            <div style="text-align:right;">${d.freeCount}/${days.length} Tg frei</div>
        </div>
    `).join("");
    
    logger.innerHTML += "✅ Abfrage beendet. Termine wurden tagesgenau geprüft.";
}

function setup(){
    localStorage.setItem("kKey", prompt("Kalender API Key:", localStorage.getItem("kKey")||""));
    localStorage.setItem("kIds", prompt("Kalender IDs (mit Komma):", localStorage.getItem("kIds")||""));
    localStorage.setItem("gKey", prompt("Google Maps API Key:", localStorage.getItem("gKey")||""));
    location.reload();
}
</script>
</body>
</html>
