<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Springer-Dispo Pro v46.1 FINAL CLEAN</title>

<style>
:root{
--blue:#2563eb;
--blue2:#1d4ed8;
--green:#16a34a;
--red:#dc2626;
--orange:#f59e0b;
--bg:#eef2f7;
--card:#ffffff;
--text:#111827;
--muted:#6b7280;
--line:#e5e7eb;
}

*{box-sizing:border-box}

body{
margin:0;
padding:20px;
font-family:Segoe UI,Arial,sans-serif;
background:linear-gradient(135deg,#eef2f7,#dbeafe);
color:var(--text);
}

.card{
max-width:920px;
margin:auto;
background:rgba(255,255,255,.96);
padding:24px;
border-radius:22px;
box-shadow:0 18px 50px rgba(0,0,0,.08);
}

h2{
margin:0 0 18px;
text-align:center;
color:var(--blue);
}

label{
display:block;
margin:10px 0 6px;
font-weight:700;
font-size:.92rem;
}

input,select,textarea{
width:100%;
padding:11px;
border:1px solid var(--line);
border-radius:12px;
font-size:1rem;
background:#fff;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

button{
border:none;
border-radius:12px;
cursor:pointer;
font-weight:700;
transition:.2s;
}

button:hover{transform:translateY(-1px)}

.main-btn{
width:100%;
padding:15px;
margin-top:15px;
background:linear-gradient(135deg,var(--blue),var(--blue2));
color:#fff;
font-size:1rem;
}

.setup-btn{
width:100%;
padding:11px;
margin-top:10px;
background:#f3f4f6;
}

.book-btn{
padding:10px 14px;
background:var(--green);
color:#fff;
margin-top:8px;
}

.log{
margin-top:14px;
padding:14px;
background:#0f172a;
color:#4ade80;
font-family:Consolas,monospace;
border-radius:14px;
font-size:.85rem;
min-height:56px;
white-space:pre-wrap;
}

#results{
max-width:920px;
margin:18px auto;
}

.driver{
background:#fff;
padding:16px;
border-radius:18px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
gap:14px;
align-items:center;
box-shadow:0 8px 20px rgba(0,0,0,.05);
border-left:8px solid #d1d5db;
}

.driver.fullfree{border-left-color:var(--green)}
.driver.partial{border-left-color:var(--orange)}
.driver.fullbusy{
border-left-color:var(--red);
background:#fff7f7;
}

.daybar{
display:flex;
gap:5px;
margin-top:8px;
flex-wrap:wrap;
}

.day{
min-width:28px;
height:28px;
padding:0 6px;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-size:.75rem;
font-weight:800;
color:#fff;
}

.free{background:var(--green)}
.busy{background:var(--red)}

.small{
font-size:.85rem;
color:var(--muted);
margin-top:5px;
}

.right{
min-width:110px;
text-align:right;
font-weight:800;
font-size:1.05rem;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
display:none;
justify-content:center;
align-items:center;
padding:18px;
z-index:999;
}

.modal-box{
background:#fff;
width:100%;
max-width:480px;
padding:24px;
border-radius:22px;
}

.modal-actions{
display:flex;
gap:10px;
margin-top:16px;
}

.cancel-btn{
flex:1;
padding:12px;
background:#e5e7eb;
}

.save-btn{
flex:2;
padding:12px;
background:var(--blue);
color:#fff;
}

@media(max-width:760px){
.row{grid-template-columns:1fr}
.driver{flex-direction:column;align-items:flex-start}
.right{text-align:left}
}
</style>
</head>

<body>

<div class="card">

<h2>Springer-Dispo Pro v46.1 FINAL CLEAN</h2>

<label>Einrichtung</label>
<select id="schoolSelect">
<option value="30655">Albert-Liebmann-Schule (30655)</option>
<option value="30165">Lebenshilfe Büttnerstraße (30165)</option>
<option value="30900">Kindergarten Domino (30900)</option>
<option value="30880">Freie Martinschule (30880)</option>
<option value="30851">Kindergarten Langenhagen (30851)</option>
<option value="30629">Kindergarten Misburg (30629)</option>
<option value="31535">Michael-Ende-Schule (31535)</option>
<option value="31515">Paul-Moor-Schule (31515)</option>
<option value="30938">Pestalozzi-Schule (30938)</option>
<option value="30853">Gutzmann Schule (30853)</option>
<option value="30926">Anne Frank Schule (30926)</option>
<option value="30827">Ilmasi Schule (30827)</option>
</select>

<label>PLZ Start</label>
<input id="startPlz" value="30159">

<div class="row">
<div>
<label>Von</label>
<input type="date" id="dateFrom" value="2026-04-27">
</div>
<div>
<label>Bis</label>
<input type="date" id="dateTo" value="2026-04-30">
</div>
</div>

<button class="main-btn" onclick="run()">Prüfen & Ranking</button>
<button class="setup-btn" onclick="setup()">⚙️ Setup</button>

<div id="log" class="log">Bereit.</div>

</div>

<div id="results"></div>

<div class="modal" id="bookModal">
<div class="modal-box">

<h3 style="margin-top:0;">Fahrer buchen</h3>

<label>Fahrer</label>
<input id="popDriver" readonly>

<label>Info</label>
<textarea id="popDesc" rows="3"></textarea>

<div class="modal-actions">
<button class="cancel-btn" onclick="closeModal()">Abbruch</button>
<button class="save-btn" onclick="confirmBooking()">Eintragen</button>
</div>

</div>
</div>

<script>
const drivers = [
{name:"Aschenbach André",plz:"30989"},
{name:"Ohm Lars",plz:"30559"},
{name:"Bachmeier Reinhard",plz:"30659"},
{name:"Isfahan Mozaffaey Hamid",plz:"30519"},
{name:"Otto Alexander",plz:"30173"},
{name:"Türkel Tuncer",plz:"30161"},
{name:"Schrader Harald",plz:"30880"},
{name:"Neubauer Michael",plz:"30853"},
{name:"Ferkau Eckart",plz:"30851"},
{name:"Bethmann Ekkehard",plz:"31535"},
{name:"Hauer Frank",plz:"30900"},
{name:"Kruse Jens Roland",plz:"31275"},
{name:"Grimpe Dirk",plz:"30827"},
{name:"Häge Klaus  Dieter",plz:"30519"},
{name:"Von Treskow Albrecht",plz:"30659"},
{name:"Giuseppe Caruso",plz:"30880"},
{name:"Popescu Viorel Florinel",plz:"30827"},
{name:"Beka Jonel",plz:"31275"},
{name:"Moser Siegfried",plz:"30827"},
{name:"Bodewell Thomas",plz:"30853"}
];

let loadedEvents = [];
let currentDriver = "";

function clean(s){
return (s || "")
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^a-z0-9]/g,"");
}

function log(t){
document.getElementById("log").textContent=t;
}

function setup(){
localStorage.setItem("kKey",prompt("Kalender API Key:",localStorage.getItem("kKey")||""));
localStorage.setItem("kIds",prompt("Kalender IDs:",localStorage.getItem("kIds")||""));
localStorage.setItem("gKey",prompt("Google API Key:",localStorage.getItem("gKey")||""));
location.reload();
}

function getDateRange(start,end){
const result=[];

const a=start.split("-");
const b=end.split("-");

let current=new Date(a[0],a[1]-1,a[2]);
let last=new Date(b[0],b[1]-1,b[2]);

while(current<=last){
const y=current.getFullYear();
const m=String(current.getMonth()+1).padStart(2,"0");
const d=String(current.getDate()).padStart(2,"0");
result.push(`${y}-${m}-${d}`);
current.setDate(current.getDate()+1);
}

return result;
}

async function run(){
try{
const kKey=localStorage.getItem("kKey");
const kIds=localStorage.getItem("kIds");
const gKey=localStorage.getItem("gKey");

if(!kKey || !kIds || !gKey) return alert("Bitte Setup ausfüllen.");

const from=dateFrom.value;
const to=dateTo.value;
const start=startPlz.value;

log("📅 Lade Kalender...");
loadedEvents=await loadEvents(from,to,kIds,kKey);

log("🗺️ Berechne Strecken...");
await loadGoogle(gKey);
const matrix=await getDistances(start);

const days=getDateRange(from,to);

let ranking=drivers.map((d,i)=>{

const states=days.map(day=>{

const hit=loadedEvents.find(ev=>{

const evDate=(ev.startDate || "").split(" ")[0];
if(evDate!==day) return false;

const txt=clean((ev.subCalendars || []).join(" "));
return txt.includes(clean(d.name));
});

return {
date:day,
busy:!!hit
};
});

const freeCount=states.filter(x=>!x.busy).length;

const el=matrix.rows[i].elements[0];

return{
...d,
states,
freeCount,
distText:el.status==="OK"?el.distance.text:"-",
distVal:el.status==="OK"?el.distance.value:999999
};

});

ranking.sort((a,b)=>(b.freeCount-a.freeCount)||(a.distVal-b.distVal));

render(ranking);

log("✅ Fertig.");

}catch(e){
log("❌ "+e.message);
}
}

async function loadEvents(from,to,kIds,kKey){
let all=[];

for(const raw of kIds.split(",")){
const id=raw.trim();

const url=`https://api.kalender.digital/public/event?calendarId=${id}&startDate=${from}&endDate=${to}T23:59:59&timeZone=Europe/Berlin&_=${Date.now()}`;

const r=await fetch("https://corsproxy.io/?"+encodeURIComponent(url),{
headers:{"X-API-KEY":kKey}
});

if(!r.ok) continue;

const data=await r.json();

if(Array.isArray(data)) all.push(...data);
else if(Array.isArray(data.events)) all.push(...data.events);
}

return all;
}

function loadGoogle(key){
return new Promise(resolve=>{
if(window.google) return resolve();
const s=document.createElement("script");
s.src=`https://maps.googleapis.com/maps/api/js?key=${key}`;
s.onload=resolve;
document.head.appendChild(s);
});
}

function getDistances(dest){
return new Promise(resolve=>{
new google.maps.DistanceMatrixService().getDistanceMatrix({
origins:drivers.map(d=>d.plz),
destinations:[dest],
travelMode:"DRIVING"
},res=>resolve(res));
});
}

function render(list){

results.innerHTML=list.map(d=>{

let cls="partial";
if(d.freeCount===0) cls="fullbusy";
if(d.freeCount===d.states.length) cls="fullfree";

return `
<div class="driver ${cls}">
<div>
<strong>${d.name}</strong>
<div class="small">${d.plz}</div>

<div class="daybar">
${d.states.map(s=>`
<div class="day ${s.busy?'busy':'free'}">
${s.date.split("-")[2]}
</div>
`).join("")}
</div>

<div class="small">Freie Tage: ${d.freeCount}/${d.states.length}</div>

${d.freeCount>0 ? `<button class="book-btn" onclick="openModal('${d.name.replace(/'/g,"\\'")}')">BUCHEN</button>` : ``}

</div>

<div class="right">${d.distText}</div>
</div>
`;

}).join("");
}

function openModal(name){
currentDriver=name;
popDriver.value=name;
bookModal.style.display="flex";
}

function closeModal(){
bookModal.style.display="none";
}

async function confirmBooking(){

try{
const kKey=localStorage.getItem("kKey");

const payload={
startDate:dateFrom.value+" 00:00:00",
endDate:dateTo.value+" 23:59:59",
timeZone:"Europe/Berlin",
title:schoolSelect.selectedOptions[0].text,
description:popDesc.value || "Gebucht",
wholeDay:true,
subCalendars:[currentDriver]
};

const r=await fetch(
"https://corsproxy.io/?"+encodeURIComponent("https://api.kalender.digital/public/event"),
{
method:"POST",
headers:{
"Content-Type":"application/json",
"X-API-KEY":kKey
},
body:JSON.stringify(payload)
});

if(!r.ok) throw new Error("Buchung fehlgeschlagen");

closeModal();
run();

}catch(e){
alert("Fehler");
}
}
</script>
</body>
</html>
