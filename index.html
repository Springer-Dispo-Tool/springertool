<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Springer-Dispo Pro v46 FINAL</title>

<style>
:root{
--blue:#2563eb;
--blue2:#1d4ed8;
--green:#16a34a;
--red:#dc2626;
--orange:#f59e0b;
--bg:#eef2f7;
--card:#ffffff;
--line:#dbe3ee;
--text:#111827;
--muted:#6b7280;
}

*{box-sizing:border-box}

body{
margin:0;
padding:20px;
font-family:Segoe UI,Arial,sans-serif;
background:linear-gradient(135deg,#eef2f7,#dbeafe);
color:var(--text);
}

.card{
max-width:980px;
margin:auto;
background:rgba(255,255,255,.96);
padding:26px;
border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,.08);
}

h2{
margin:0 0 18px;
text-align:center;
color:var(--blue);
font-size:1.9rem;
}

label{
display:block;
margin:12px 0 6px;
font-weight:700;
font-size:.92rem;
}

input,select,textarea{
width:100%;
padding:12px;
border:1px solid var(--line);
border-radius:12px;
font-size:1rem;
background:#fff;
}

input:focus,select:focus,textarea:focus{
outline:none;
border-color:var(--blue);
box-shadow:0 0 0 3px rgba(37,99,235,.12);
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.inline{
display:flex;
align-items:center;
gap:10px;
margin-top:10px;
}

.inline input{
width:auto;
transform:scale(1.2);
}

button{
border:none;
border-radius:12px;
cursor:pointer;
font-weight:700;
transition:.2s;
}

button:hover{transform:translateY(-1px)}

.main-btn{
width:100%;
padding:15px;
margin-top:15px;
background:linear-gradient(135deg,var(--blue),var(--blue2));
color:#fff;
font-size:1rem;
}

.setup-btn{
width:100%;
padding:11px;
margin-top:10px;
background:#f3f4f6;
}

.log{
margin-top:14px;
padding:14px;
background:#0f172a;
color:#4ade80;
font-family:Consolas,monospace;
border-radius:14px;
font-size:.84rem;
min-height:56px;
white-space:pre-wrap;
}

#results{
max-width:980px;
margin:18px auto;
}

.driver{
background:#fff;
padding:16px;
border-radius:18px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
gap:18px;
align-items:center;
box-shadow:0 8px 20px rgba(0,0,0,.05);
border-left:8px solid #d1d5db;
}

.driver.good{border-left-color:var(--green)}
.driver.mid{border-left-color:var(--orange)}
.driver.full{border-left-color:var(--red);background:#fff7f7}

.left{
flex:1;
}

.name{
font-weight:800;
font-size:1.03rem;
}

.meta{
font-size:.86rem;
color:var(--muted);
margin-top:4px;
}

.daybar{
display:flex;
gap:6px;
margin-top:10px;
flex-wrap:wrap;
}

.day{
width:30px;
height:30px;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-size:.78rem;
font-weight:800;
color:#fff;
}

.free{background:var(--green)}
.busy{background:var(--red)}

.right{
min-width:150px;
text-align:right;
}

.dist{
font-size:1.1rem;
font-weight:800;
}

.freeinfo{
margin-top:8px;
font-size:.9rem;
font-weight:700;
}

.book-btn{
margin-top:10px;
padding:10px 14px;
background:linear-gradient(135deg,#16a34a,#15803d);
color:#fff;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
display:none;
justify-content:center;
align-items:center;
padding:18px;
z-index:999;
}

.modal-box{
background:#fff;
width:100%;
max-width:520px;
padding:24px;
border-radius:24px;
box-shadow:0 25px 60px rgba(0,0,0,.20);
}

.modal-actions{
display:flex;
gap:10px;
margin-top:18px;
}

.cancel-btn{
flex:1;
padding:12px;
background:#e5e7eb;
}

.save-btn{
flex:2;
padding:12px;
background:linear-gradient(135deg,var(--blue),var(--blue2));
color:#fff;
}

@media(max-width:760px){
.row{grid-template-columns:1fr}
.driver{flex-direction:column;align-items:flex-start}
.right{text-align:left;width:100%}
}
</style>
</head>
<body>

<div class="card">

<h2>Springer-Dispo Pro v46 FINAL</h2>

<label>Einrichtung</label>
<select id="schoolSelect">
<option value="30655">Albert-Liebmann-Schule (30655)</option>
<option value="30165">Lebenshilfe Büttnerstraße (30165)</option>
<option value="30900">Kindergarten Domino (30900)</option>
<option value="30880">Freie Martinschule (30880)</option>
<option value="30851">Kindergarten Langenhagen (30851)</option>
<option value="30629">Kindergarten Misburg (30629)</option>
<option value="31535">Michael-Ende-Schule (31535)</option>
<option value="31515">Paul-Moor-Schule (31515)</option>
<option value="30938">Pestalozzi-Schule (30938)</option>
<option value="30853">Gutzmann Schule (30853)</option>
<option value="30926">Anne Frank Schule (30926)</option>
<option value="30827">Ilmasi Schule (30827)</option>
</select>

<label>PLZ Start</label>
<input id="startPlz" value="30159">

<div class="row">
<div>
<label>Von</label>
<input type="date" id="dateFrom" value="2026-04-27">
</div>
<div>
<label>Bis</label>
<input type="date" id="dateTo" value="2026-04-30">
</div>
</div>

<button class="main-btn" onclick="run()">Prüfen & Ranking</button>
<button class="setup-btn" onclick="setup()">⚙️ Setup</button>

<div id="log" class="log">Bereit.</div>

</div>

<div id="results"></div>

<!-- Popup -->
<div class="modal" id="bookModal">
<div class="modal-box">

<h3 style="margin-top:0;">Fahrer buchen</h3>

<label>Fahrer</label>
<input id="popDriver" readonly>

<label>Beschreibung</label>
<textarea id="popDesc" rows="3"></textarea>

<div class="modal-actions">
<button class="cancel-btn" onclick="closeModal()">Abbruch</button>
<button class="save-btn" onclick="confirmBooking()">Eintragen</button>
</div>

</div>
</div>

<script>
const drivers = [
{name:"Aschenbach André",plz:"30989"},
{name:"Ohm Lars",plz:"30559"},
{name:"Bachmeier Reinhard",plz:"30659"},
{name:"Isfahan Mozaffaey Hamid",plz:"30519"},
{name:"Otto Alexander",plz:"30173"},
{name:"Türkel Tuncer",plz:"30161"},
{name:"Schrader Harald",plz:"30880"},
{name:"Neubauer Michael",plz:"30853"},
{name:"Ferkau Eckart",plz:"30851"},
{name:"Bethmann Ekkehard",plz:"31535"},
{name:"Hauer Frank",plz:"30900"},
{name:"Kruse Jens Roland",plz:"31275"},
{name:"Grimpe Dirk",plz:"30827"},
{name:"Häge Klaus  Dieter",plz:"30519"},
{name:"Von Treskow Albrecht",plz:"30659"},
{name:"Giuseppe Caruso",plz:"30880"},
{name:"Popescu Viorel Florinel",plz:"30827"},
{name:"Beka Jonel",plz:"31275"},
{name:"Moser Siegfried",plz:"30827"},
{name:"Bodewell Thomas",plz:"30853"}
];

let loadedEvents=[];
let currentDriver="";

function clean(s){
return (s||"")
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^a-z0-9]/g,"");
}

function setup(){
localStorage.setItem("kKey",prompt("Kalender API Key:",localStorage.getItem("kKey")||""));
localStorage.setItem("kIds",prompt("Kalender IDs:",localStorage.getItem("kIds")||""));
localStorage.setItem("gKey",prompt("Google API Key:",localStorage.getItem("gKey")||""));
location.reload();
}

function log(t){
document.getElementById("log").textContent=t;
}

function getDateRange(start,end){
let arr=[];
let d=new Date(start+"T00:00:00");
let e=new Date(end+"T00:00:00");

while(d<=e){
arr.push(d.toISOString().split("T")[0]);
d.setDate(d.getDate()+1);
}
return arr;
}

async function run(){
try{
const kKey=localStorage.getItem("kKey");
const kIds=localStorage.getItem("kIds");
const gKey=localStorage.getItem("gKey");

if(!kKey || !kIds || !gKey){
alert("Bitte Setup ausfüllen.");
return;
}

const from=dateFrom.value;
const to=dateTo.value;
const start=startPlz.value;

log("📅 Lade Kalender...");
loadedEvents=await loadEvents(from,to,kIds,kKey);

log("🗺️ Berechne Strecken...");
await loadGoogle(gKey);
const matrix=await getDistances(start);

const days=getDateRange(from,to);

let ranking=drivers.map((d,i)=>{

const dayStates=days.map(day=>{
return isDriverBusyOnDate(d.name,day,loadedEvents);
});

const freeCount=dayStates.filter(x=>!x.busy).length;

const el=matrix.rows[i].elements[0];

return{
...d,
dayStates,
freeCount,
distText:el.status==="OK"?el.distance.text:"-",
distVal:el.status==="OK"?el.distance.value:999999
};
});

ranking.sort((a,b)=>(b.freeCount-a.freeCount)||(a.distVal-b.distVal));

render(ranking);

log("✅ Fertig.");

}catch(e){
log("❌ "+e.message);
}
}

async function loadEvents(from,to,kIds,kKey){
let all=[];

for(const raw of kIds.split(",")){
const id=raw.trim();

const url=`https://api.kalender.digital/public/event?calendarId=${id}&startDate=${from}&endDate=${to}T23:59:59&timeZone=Europe/Berlin&_=${Date.now()}`;

const proxy="https://corsproxy.io/?"+encodeURIComponent(url);

const r=await fetch(proxy,{headers:{"X-API-KEY":kKey}});

if(!r.ok) continue;

const data=await r.json();

if(Array.isArray(data)) all.push(...data);
else if(Array.isArray(data.events)) all.push(...data.events);
}

return all;
}

function isDriverBusyOnDate(driverName,date,events){

const search=clean(driverName);

for(const ev of events){

const names=clean((ev.subCalendars||[]).join(" "));
if(!names.includes(search)) continue;

const start=(ev.startDate||"").split(" ")[0];
const end=(ev.endDate||"").split(" ")[0];

if(date>=start && date<=end){
return {busy:true,date};
}
}

return {busy:false,date};
}

function render(list){

results.innerHTML=list.map(d=>{

let cls="mid";
if(d.freeCount===0) cls="full";
if(d.freeCount===d.dayStates.length) cls="good";

return `
<div class="driver ${cls}">
<div class="left">

<div class="name">${d.name}</div>
<div class="meta">${d.plz}</div>

<div class="daybar">
${d.dayStates.map(x=>`
<div class="day ${x.busy?'busy':'free'}">
${x.date.split("-")[2]}
</div>
`).join("")}
</div>

<div class="freeinfo">
Freie Tage: ${d.freeCount} / ${d.dayStates.length}
</div>

${d.freeCount>0?`
<button class="book-btn" onclick="openModal('${safe(d.name)}')">
BUCHEN
</button>`:""}

</div>

<div class="right">
<div class="dist">${d.distText}</div>
</div>

</div>
`;

}).join("");
}

function safe(t){
return t.replace(/'/g,"\\'");
}

function openModal(name){
currentDriver=name;
popDriver.value=name;
bookModal.style.display="flex";
}

function closeModal(){
bookModal.style.display="none";
}

async function confirmBooking(){

try{

const kKey=localStorage.getItem("kKey");

const payload={
startDate:dateFrom.value+" 00:00:00",
endDate:dateTo.value+" 23:59:59",
timeZone:"Europe/Berlin",
title:schoolSelect.selectedOptions[0].text,
description:popDesc.value||"",
wholeDay:true,
subCalendars:[currentDriver]
};

const proxy="https://corsproxy.io/?"+encodeURIComponent("https://api.kalender.digital/public/event");

const r=await fetch(proxy,{
method:"POST",
headers:{
"Content-Type":"application/json",
"X-API-KEY":kKey
},
body:JSON.stringify(payload)
});

if(!r.ok) throw new Error("Buchung fehlgeschlagen");

closeModal();
await run();
alert("✅ Eingetragen");

}catch(e){
alert("❌ "+e.message);
}
}

function loadGoogle(key){
return new Promise(resolve=>{
if(window.google) return resolve();

const s=document.createElement("script");
s.src=`https://maps.googleapis.com/maps/api/js?key=${key}`;
s.onload=resolve;
document.head.appendChild(s);
});
}

function getDistances(dest){
return new Promise(resolve=>{
new google.maps.DistanceMatrixService().getDistanceMatrix({
origins:drivers.map(d=>d.plz),
destinations:[dest],
travelMode:"DRIVING"
},res=>resolve(res));
});
}
</script>

</body>
</html>
