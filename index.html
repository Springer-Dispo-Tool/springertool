<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Springer-Dispo Pro v61.0</title>
<style>
:root{ --blue:#2563eb; --green:#16a34a; --red:#dc2626; --orange:#f59e0b; --bg:#eef2f7; --text:#111827; }
body{margin:0;padding:20px;font-family:Segoe UI,sans-serif;background:var(--bg);color:var(--text);}
.card{max-width:920px;margin:auto;background:#fff;padding:26px;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.10);}
h2{margin:0 0 18px;text-align:center;color:var(--blue);}
label{display:block;margin:12px 0 6px;font-weight:700;}
input,select{width:100%;padding:12px;border:1px solid #ccc;border-radius:12px;margin-bottom:10px;box-sizing:border-box;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
button{border:none;border-radius:12px;cursor:pointer;font-weight:700;transition:.2s;}
.main-btn{width:100%;padding:15px;background:var(--blue);color:#fff;font-size:1rem;}
.log{margin-top:14px;padding:14px;background:#0f172a;color:#4ade80;font-family:monospace;border-radius:14px;font-size:.85rem;min-height:80px;white-space:pre-wrap;overflow-y:auto;max-height:200px;}
.driver{background:#fff;padding:16px;border-radius:18px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 8px 20px rgba(0,0,0,0.06);border-left:8px solid #ccc;}
.all-free{border-left-color:var(--green);}
.part-free{border-left-color:var(--orange);}
.full-busy{border-left-color:var(--red);}
.day-strip{display:flex;gap:5px;margin:2px 0 10px 0;}
.day-box{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:bold;color:#fff;}
.day-free{background:var(--green);}
.day-busy{background:var(--red);}
.book-btn{background:var(--green);color:#fff;padding:6px 12px;border-radius:8px;font-size:0.8rem;}
</style>
</head>
<body>

<div class="card">
    <h2>Springer-Dispo Pro v61.0</h2>
    
    <label>Einrichtung PLZ (oder Name)</label>
    <select id="schoolSelect" onchange="if(this.value) document.getElementById('startPlz').value = this.value;">
        <option value="">-- Schule wählen --</option>
        <option value="30655">Albert-Liebmann-Schule (30655)</option>
        <option value="30827">Ilmasi Schule (30827)</option>
        <option value="30853">Gutzmann Schule (30853)</option>
        <option value="31535">Michael-Ende-Schule (31535)</option>
    </select>

    <label>PLZ Start</label>
    <input id="startPlz" value="30159">

    <div class="row">
        <div><label>Von</label><input type="date" id="dateFrom" value="2026-04-27"></div>
        <div><label>Bis</label><input type="date" id="dateTo" value="2026-04-30"></div>
    </div>

    <button class="main-btn" onclick="run()">Abfrage starten</button>
    <button onclick="setup()" style="width:100%;background:#f3f4f6;padding:10px;margin-top:10px;border-radius:12px;">⚙️ Setup (API, IDs, Google)</button>
    <div id="log" class="log">Bereit.</div>
</div>

<div id="results" style="margin-top:20px;max-width:920px;margin:auto;"></div>

<script>
const drivers = [
    {name:"Aschenbach André",plz:"30989"},{name:"Ohm Lars",plz:"30559"},{name:"Bachmeier Reinhard",plz:"30659"},
    {name:"Isfahan Mozaffaey Hamid",plz:"30519"},{name:"Otto Alexander",plz:"30173"},{name:"Türkel Tuncer",plz:"30161"},
    {name:"Schrader Harald",plz:"30880"},{name:"Neubauer Michael",plz:"30853"},{name:"Ferkau Eckart",plz:"30851"},
    {name:"Bethmann Ekkehard",plz:"31535"},{name:"Hauer Frank",plz:"30900"},{name:"Kruse Jens Roland",plz:"31275"},
    {name:"Grimpe Dirk",plz:"30827"},{name:"Häge Klaus Dieter",plz:"30519"},{name:"Von Treskow Albrecht",plz:"30659"},
    {name:"Giuseppe Caruso",plz:"30880"},{name:"Popescu Viorel Florinel",plz:"30827"},{name:"Beka Jonel",plz:"31275"},
    {name:"Moser Siegfried",plz:"30827"},{name:"Bodewell Thomas",plz:"30853"}
];

function setup() {
    const api = prompt("Kalender API Key:");
    const ids = prompt("Kalender IDs (kommagetrennt):");
    const maps = prompt("Google Maps API Key:");
    if(api) localStorage.setItem("kKey", api);
    if(ids) localStorage.setItem("kIds", ids);
    if(maps) localStorage.setItem("gKey", maps);
    alert("Daten gespeichert! Seite wird neu geladen.");
    location.reload();
}

async function run() {
    const kKey = localStorage.getItem("kKey"), kIds = localStorage.getItem("kIds");
    if (!kKey || !kIds) return alert("Setup fehlt!");

    const logger = document.getElementById("log");
    const from = document.getElementById("dateFrom").value;
    const to = document.getElementById("dateTo").value;
    logger.innerHTML = "⏳ Lade Kalender-Daten...\n";

    let allEvents = [];
    try {
        const idsArr = kIds.split(",");
        for (const id of idsArr) {
            const url = `https://api.kalender.digital/public/event?startDate=${from}&endDate=${to}&timeZone=Europe/Berlin`;
            const r = await fetch("https://corsproxy.io/?" + encodeURIComponent(url), {
                headers: { "X-API-KEY": kKey }
            });
            const data = await r.json();
            const events = data.events || data || [];
            allEvents.push(...events);
        }
    } catch(e) { logger.innerHTML += "❌ API-Fehler: " + e.message + "\n"; }

    // Tage generieren
    let days = [];
    let cur = new Date(from);
    let end = new Date(to);
    while (cur <= end) {
        days.push(cur.toISOString().split('T')[0]);
        cur.setDate(cur.getDate() + 1);
    }

    const ranking = drivers.map(d => {
        const lastName = d.name.split(" ")[0].toLowerCase().trim();
        const fullName = d.name.toLowerCase().trim();

        const states = days.map(day => {
            const match = allEvents.find(e => {
                const eStart = e.startDate.split(" ")[0];
                const eEnd = e.endDate.split(" ")[0];
                if (!(day >= eStart && day <= eEnd)) return false;

                const title = (e.title || "").toLowerCase();
                const subs = (e.subCalendars || []).map(s => String(s).toLowerCase());
                
                // Namens-Check (ignoriert createdName!)
                const tMatch = title.includes(lastName) || title.includes(fullName);
                const sMatch = subs.some(s => s.includes(lastName) || s.includes(fullName));

                return tMatch || sMatch;
            });
            return { day, busy: !!match, title: match ? match.title : "Frei" };
        });
        return { ...d, states, freeCount: states.filter(s => !s.busy).length };
    });

    ranking.sort((a, b) => b.freeCount - a.freeCount);
    
    document.getElementById("results").innerHTML = ranking.map(d => `
        <div class="driver ${d.freeCount == d.states.length ? 'all-free' : (d.freeCount == 0 ? 'full-busy' : 'part-free')}">
            <div>
                <strong>${d.name}</strong>
                <div class="day-strip">
                    ${d.states.map(s => `<div class="day-box ${s.busy ? 'day-busy' : 'day-free'}" title="${s.day}: ${s.title}">${s.day.split("-")[2]}</div>`).join("")}
                </div>
                <button class="book-btn" onclick="alert('Buchung für ${d.name} wird vorbereitet...')">BUCHEN</button>
            </div>
            <div style="font-weight:bold;">${d.freeCount}/${d.states.length} Frei</div>
        </div>`).join("");
    
    logger.innerHTML += `✅ Analyse von ${ranking.length} Fahrern fertig.`;
}
</script>
</body>
</html>
