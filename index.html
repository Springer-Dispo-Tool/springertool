<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Springer Dispo V47.1 MASTER FIXED</title>

<style>
:root{
--blue:#2563eb;
--blue2:#1d4ed8;
--green:#16a34a;
--red:#dc2626;
--orange:#f59e0b;
--bg:#eef2f7;
--text:#111827;
--muted:#6b7280;
}
*{box-sizing:border-box}
body{
margin:0;
padding:20px;
font-family:Segoe UI,Arial,sans-serif;
background:linear-gradient(135deg,#eef2f7,#dbeafe);
color:var(--text);
}
.card{
max-width:980px;
margin:auto;
background:#fff;
padding:24px;
border-radius:24px;
box-shadow:0 20px 60px rgba(0,0,0,.08);
}
h2{
margin:0 0 18px;
text-align:center;
color:var(--blue);
}
label{
display:block;
margin:12px 0 6px;
font-weight:700;
font-size:.92rem;
}
input,select,textarea{
width:100%;
padding:12px;
border:1px solid #e5e7eb;
border-radius:12px;
font-size:1rem;
}
.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}
button{
border:none;
border-radius:12px;
cursor:pointer;
font-weight:700;
transition:.15s;
}
button:hover{transform:translateY(-1px)}
.main-btn{
width:100%;
padding:15px;
margin-top:14px;
background:linear-gradient(135deg,var(--blue),var(--blue2));
color:#fff;
font-size:1rem;
}
.setup-btn{
width:100%;
padding:12px;
margin-top:10px;
background:#f3f4f6;
}
.book-btn{
padding:10px 14px;
background:var(--green);
color:#fff;
margin-top:8px;
}
.log{
margin-top:14px;
padding:14px;
background:#0f172a;
color:#4ade80;
font-family:Consolas,monospace;
border-radius:14px;
font-size:.86rem;
white-space:pre-wrap;
min-height:58px;
}
#results{
max-width:980px;
margin:18px auto;
}
.driver{
background:#fff;
padding:16px;
border-radius:18px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
gap:15px;
align-items:center;
box-shadow:0 8px 20px rgba(0,0,0,.06);
border-left:8px solid #d1d5db;
}
.driver.free{border-left-color:var(--green)}
.driver.partial{border-left-color:var(--orange)}
.driver.busy{border-left-color:var(--red)}
.right{
min-width:140px;
text-align:right;
font-weight:800;
font-size:1.1rem;
}
.small{
font-size:.85rem;
color:var(--muted);
}
.daybar{
display:flex;
gap:5px;
margin-top:8px;
flex-wrap:wrap;
}
.day{
width:30px;
height:30px;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-size:.78rem;
font-weight:800;
color:#fff;
}
.freeDay{background:var(--green)}
.busyDay{background:var(--red)}
@media(max-width:760px){
.row{grid-template-columns:1fr}
.driver{flex-direction:column;align-items:flex-start}
.right{text-align:left}
}
</style>
</head>

<body>

<div class="card">
<h2>Springer Dispo V47.1 MASTER FIXED</h2>

<label>Einrichtung</label>
<select id="schoolSelect" onchange="if(this.value)document.getElementById('startPlz').value=this.value">
<option value="">-- Wählen --</option>
<option value="30655">Albert-Liebmann-Schule (30655)</option>
<option value="30165">Lebenshilfe Büttnerstraße (30165)</option>
<option value="30900">Kindergarten Domino (30900)</option>
<option value="30880">Freie Martinschule (30880)</option>
<option value="30851">Kindergarten Langenhagen (30851)</option>
<option value="30629">Kindergarten Misburg (30629)</option>
<option value="31535">Michael-Ende-Schule (31535)</option>
<option value="31515">Paul-Moor-Schule (31515)</option>
<option value="30938">Pestalozzi-Schule (30938)</option>
<option value="30853">Gutzmann Schule (30853)</option>
<option value="30926">Anne Frank Schule (30926)</option>
<option value="30827">Ilmasi Schule (30827)</option>
</select>

<label>PLZ Start</label>
<input id="startPlz" value="30159">

<div class="row">
<div>
<label>Von</label>
<input type="date" id="dateFrom" value="2026-04-28">
</div>
<div>
<label>Bis</label>
<input type="date" id="dateTo" value="2026-04-30">
</div>
</div>

<button class="main-btn" onclick="run()">Verfügbarkeit & Ranking prüfen</button>
<button class="setup-btn" onclick="setup()">⚙️ API Setup</button>

<div id="log" class="log">Bereit.</div>
</div>

<div id="results"></div>

<script>
const drivers = [
{name:"Aschenbach André",plz:"30989"},
{name:"Ohm Lars",plz:"30559"},
{name:"Bachmeier Reinhard",plz:"30659"},
{name:"Isfahan Mozaffaey Hamid",plz:"30519"},
{name:"Otto Alexander",plz:"30173"},
{name:"Türkel Tuncer",plz:"30161"},
{name:"Schrader Harald",plz:"30880"},
{name:"Neubauer Michael",plz:"30853"},
{name:"Ferkau Eckart",plz:"30851"},
{name:"Bethmann Ekkehard",plz:"31535"},
{name:"Hauer Frank",plz:"30900"},
{name:"Kruse Jens Roland",plz:"31275"},
{name:"Grimpe Dirk",plz:"30827"},
{name:"Häge Klaus Dieter",plz:"30519"},
{name:"Von Treskow Albrecht",plz:"30659"},
{name:"Giuseppe Caruso",plz:"30880"},
{name:"Popescu Viorel Florinel",plz:"30827"},
{name:"Beka Jonel",plz:"31275"},
{name:"Moser Siegfried",plz:"30827"},
{name:"Bodewell Thomas",plz:"30853"}
];

let loadedEvents=[];

function log(t){
document.getElementById("log").textContent=t;
}

function setup(){
localStorage.setItem("kKey",prompt("Kalender API Key:",localStorage.getItem("kKey")||""));
localStorage.setItem("kIds",prompt("Kalender IDs:",localStorage.getItem("kIds")||""));
localStorage.setItem("gKey",prompt("Google API Key:",localStorage.getItem("gKey")||""));
location.reload();
}

function clean(s){
return (s||"")
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^a-z0-9]/g,"");
}

function getDateRange(from,to){
let arr=[];
let d=new Date(from+"T12:00:00");
let end=new Date(to+"T12:00:00");
while(d<=end){
arr.push(d.toISOString().slice(0,10));
d.setDate(d.getDate()+1);
}
return arr;
}

async function loadEvents(from,to,ids,key){
let all=[];
for(const raw of ids.split(",")){
const id=raw.trim();
const url=`https://api.kalender.digital/public/event?calendarId=${id}&startDate=${from}&endDate=${to}T23:59:59&timeZone=Europe/Berlin&_=${Date.now()}`;
const proxy="https://corsproxy.io/?"+encodeURIComponent(url);
const r=await fetch(proxy,{headers:{"X-API-KEY":key}});
if(!r.ok) continue;
const d=await r.json();
if(Array.isArray(d)) all.push(...d);
else if(Array.isArray(d.events)) all.push(...d.events);
}
return all;
}

function parseDateLocal(s){
if(!s) return null;
return new Date(s.replace(" ","T"));
}

/* MASTER FIX:
Wenn Termin endet exakt 00:00:00,
dann zählt Endtag NICHT als blockiert.
*/
function eventBlocksDay(ev,day){
const start=parseDateLocal(ev.startDate);
const end=parseDateLocal(ev.endDate);
if(!start || !end) return false;

const dayStart=new Date(day+"T00:00:00");
const nextDay=new Date(day+"T24:00:00");

let effectiveEnd=new Date(end);

/* Mitternacht-Ende korrigieren */
if(
end.getHours()===0 &&
end.getMinutes()===0 &&
end.getSeconds()===0
){
effectiveEnd.setMilliseconds(effectiveEnd.getMilliseconds()-1);
}

return start < nextDay && effectiveEnd >= dayStart;
}

function driverOwnsEvent(driver,ev){
const name=clean(driver.name);
const txt=clean((ev.subCalendars||[]).join(" "));
return txt.includes(name);
}

async function loadGoogle(key){
return new Promise(resolve=>{
if(window.google){resolve();return;}
const s=document.createElement("script");
s.src=`https://maps.googleapis.com/maps/api/js?key=${key}`;
s.onload=resolve;
document.head.appendChild(s);
});
}

function getDistances(dest){
return new Promise(resolve=>{
new google.maps.DistanceMatrixService().getDistanceMatrix({
origins:drivers.map(d=>d.plz),
destinations:[dest],
travelMode:"DRIVING"
},r=>resolve(r));
});
}

async function run(){
try{
const kKey=localStorage.getItem("kKey");
const kIds=localStorage.getItem("kIds");
const gKey=localStorage.getItem("gKey");

if(!kKey || !kIds || !gKey){
alert("Bitte Setup ausfüllen.");
return;
}

const from=document.getElementById("dateFrom").value;
const to=document.getElementById("dateTo").value;
const start=document.getElementById("startPlz").value;

log("📅 Lade Kalenderdaten...");
loadedEvents=await loadEvents(from,to,kIds,kKey);

log("🗺️ Berechne Wege...");
await loadGoogle(gKey);
const matrix=await getDistances(start);

const days=getDateRange(from,to);

let ranking=drivers.map((d,i)=>{

const states=days.map(day=>{
const busy=loadedEvents.some(ev =>
driverOwnsEvent(d,ev) &&
eventBlocksDay(ev,day)
);
return {day,busy};
});

const freeCount=states.filter(x=>!x.busy).length;

const el=matrix.rows[i].elements[0];

return {
...d,
states,
freeCount,
distText:el.status==="OK"?el.distance.text:"-",
distVal:el.status==="OK"?el.distance.value:999999
};
});

ranking.sort((a,b)=>{
if(b.freeCount!==a.freeCount) return b.freeCount-a.freeCount;
return a.distVal-b.distVal;
});

render(ranking);

log("✅ Analyse abgeschlossen.");
}catch(e){
log("❌ "+e.message);
}
}

function render(list){
document.getElementById("results").innerHTML=list.map(d=>{

let cls="busy";
if(d.freeCount===d.states.length) cls="free";
else if(d.freeCount>0) cls="partial";

return `
<div class="driver ${cls}">
<div>
<strong>${d.name}</strong>
<div class="small">${d.plz}</div>

<div class="daybar">
${d.states.map(s=>`
<div class="day ${s.busy?'busyDay':'freeDay'}">
${s.day.slice(8)}
</div>
`).join("")}
</div>

${d.freeCount>0?`<button class="book-btn">BUCHEN</button>`:""}

</div>

<div class="right">
${d.distText}<br>
<div class="small">${d.freeCount}/${d.states.length} Tage frei</div>
</div>
</div>
`;
}).join("");
}
</script>
</body>
</html>
