<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Springer-Dispo Pro v46.4 REPAIR</title>
<style>
:root{ --blue:#2563eb; --green:#16a34a; --red:#dc2626; --orange:#f59e0b; --text:#111827; }
body{margin:0;padding:20px;font-family:sans-serif;background:#f0f4f8;color:var(--text);}
.card{max-width:900px;margin:auto;background:#fff;padding:25px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1);}
input,select{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #ccc;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
button{width:100%;padding:15px;border-radius:12px;border:none;cursor:pointer;font-weight:bold;margin-top:10px;}
.main-btn{background:var(--blue);color:#fff;}
#results{max-width:900px;margin:20px auto;}
.driver{background:#fff;padding:15px;border-radius:15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 10px rgba(0,0,0,0.05);border-left:8px solid #ccc;}
.driver.good{border-left-color:var(--green)}
.driver.mid{border-left-color:var(--orange)}
.driver.full{border-left-color:var(--red)}
.daybar{display:flex;gap:5px;margin-top:10px;}
.day{width:35px;height:35px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:bold;color:#fff;}
.free{background:var(--green)}
.busy{background:var(--red)}
.log{margin-top:15px;padding:10px;background:#1a202c;color:#4ade80;border-radius:10px;font-family:monospace;font-size:0.8rem;}
</style>
</head>
<body>

<div class="card">
    <h2>Springer-Dispo Pro v46.4</h2>
    <label>Einrichtung</label>
    <select id="schoolSelect" onchange="document.getElementById('startPlz').value=this.value">
        <option value="30159">-- Bitte wählen --</option>
        <option value="30655">Albert-Liebmann-Schule (30655)</option>
        <option value="30827">Ilmasi Schule (30827)</option>
        <option value="30851">Kiga Langenhagen (30851)</option>
    </select>
    <input id="startPlz" placeholder="PLZ Start" value="30159">
    <div class="row">
        <input type="date" id="dateFrom" value="2026-04-27">
        <input type="date" id="dateTo" value="2026-04-30">
    </div>
    <button class="main-btn" onclick="run()">PRÜFEN</button>
    <button onclick="setup()">⚙️ SETUP</button>
    <div id="log" class="log">Bereit.</div>
</div>

<div id="results"></div>

<script>
const drivers = [
    {name:"Aschenbach André",plz:"30989"}, {name:"Ohm Lars",plz:"30559"},
    {name:"Bachmeier Reinhard",plz:"30659"}, {name:"Isfahan Mozaffaey Hamid",plz:"30519"},
    {name:"Otto Alexander",plz:"30173"}, {name:"Türkel Tuncer",plz:"30161"},
    {name:"Schrader Harald",plz:"30880"}, {name:"Neubauer Michael",plz:"30853"},
    {name:"Ferkau Eckart",plz:"30851"}, {name:"Bethmann Ekkehard",plz:"31535"},
    {name:"Hauer Frank",plz:"30900"}, {name:"Kruse Jens Roland",plz:"31275"},
    {name:"Grimpe Dirk",plz:"30827"}, {name:"Häge Klaus Dieter",plz:"30519"},
    {name:"Von Treskow Albrecht",plz:"30659"}, {name:"Giuseppe Caruso",plz:"30880"},
    {name:"Popescu Viorel Florinel",plz:"30827"}, {name:"Beka Jonel",plz:"31275"},
    {name:"Moser Siegfried",plz:"30827"}, {name:"Bodewell Thomas",plz:"30853"}
];

let loadedEvents = [];

function clean(s){ return (s||"").toLowerCase().replace(/[^a-z0-9]/g,""); }

async function run(){
    const kKey=localStorage.getItem("kKey"), kIds=localStorage.getItem("kIds");
    if(!kKey || !kIds) return alert("Setup fehlt!");

    document.getElementById("log").textContent = "Lade Daten...";
    loadedEvents = await loadEvents(dateFrom.value, dateTo.value, kIds, kKey);
    
    // Einfache Liste der Tage erstellen
    let days = [];
    let cur = new Date(dateFrom.value);
    let end = new Date(dateTo.value);
    while(cur <= end){
        days.push(cur.toISOString().split('T')[0]);
        cur.setDate(cur.getDate() + 1);
    }

    let html = "";
    drivers.forEach(d => {
        let dayStatus = days.map(day => {
            const isBusy = loadedEvents.some(ev => {
                const names = clean((ev.subCalendars || []).join("") + ev.title);
                const start = ev.startDate.split(" ")[0];
                const end = ev.endDate.split(" ")[0];
                return names.includes(clean(d.name)) && (day >= start && day <= end);
            });
            return { day, isBusy };
        });

        let freeCount = dayStatus.filter(s => !s.isBusy).length;
        let cls = freeCount === days.length ? "good" : (freeCount === 0 ? "full" : "mid");

        html += `<div class="driver ${cls}">
            <div>
                <strong>${d.name}</strong>
                <div class="daybar">${dayStatus.map(s => `<div class="day ${s.isBusy?'busy':'free'}">${s.day.split("-")[2]}</div>`).join("")}</div>
            </div>
            <div style="text-align:right">Freie Tage: ${freeCount}</div>
        </div>`;
    });
    
    document.getElementById("results").innerHTML = html;
    document.getElementById("log").textContent = "Fertig.";
}

async function loadEvents(f, t, ids, key){
    let all = [];
    for(const id of ids.split(",")){
        const url = `https://api.kalender.digital/public/event?calendarId=${id.trim()}&startDate=${f}&endDate=${t}T23:59:59&timeZone=Europe/Berlin`;
        try {
            const r = await fetch("https://corsproxy.io/?" + encodeURIComponent(url), {headers:{"X-API-KEY":key}});
            const data = await r.json();
            all.push(...(data.events || data || []));
        } catch(e) { console.error(e); }
    }
    return all;
}

function setup(){
    localStorage.setItem("kKey", prompt("API Key:"));
    localStorage.setItem("kIds", prompt("Kalender IDs (mit Komma):"));
    location.reload();
}
</script>
</body>
</html>
