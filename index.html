<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Springer-Dispo Pro v58.0 - Debug Mode</title>
<style>
:root{ --blue:#2563eb; --green:#16a34a; --red:#dc2626; --bg:#eef2f7; }
body{margin:0;padding:20px;font-family:sans-serif;background:var(--bg);}
.card{max-width:900px;margin:auto;background:#fff;padding:26px;border-radius:24px;box-shadow:0 10px 30px rgba(0,0,0,0.1);}
button{width:100%;padding:15px;background:var(--blue);color:#fff;font-weight:700;border:none;border-radius:12px;cursor:pointer;}
.log{margin-top:14px;padding:14px;background:#0f172a;color:#4ade80;font-family:monospace;border-radius:14px;font-size:.85rem;white-space:pre-wrap;max-height:200px;overflow-y:auto;}
</style>
</head>
<body>

<div class="card">
    <h2>Springer-Dispo Pro v58.0</h2>
    <p>1. Konsole mit <b>F12</b> öffnen.<br>2. Abfrage starten.<br>3. Den Text hinter "RAW EVENT SAMPLE" an Claude schicken.</p>
    
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px;">
        <input type="date" id="dateFrom" value="2026-04-27">
        <input type="date" id="dateTo" value="2026-04-30">
    </div>

    <button onclick="run()">Abfrage starten & Loggen</button>
    <div id="log" class="log">Bereit für Diagnose...</div>
</div>

<script>
async function run() {
    const kKey = localStorage.getItem("kKey"), kIds = localStorage.getItem("kIds");
    if (!kKey || !kIds) return alert("Setup fehlt!");

    const logger = document.getElementById("log");
    const fromStr = document.getElementById("dateFrom").value;
    const toStr = document.getElementById("dateTo").value;
    
    logger.innerHTML = "⏳ API wird abgefragt...\n";

    let allEvents = [];
    try {
        const ids = kIds.split(",");
        for (const id of ids) {
            const url = `https://api.kalender.digital/public/event?startDate=${fromStr}&endDate=${toStr}&timeZone=Europe/Berlin`;
            const r = await fetch("https://corsproxy.io/?" + encodeURIComponent(url), {
                headers: { "X-API-KEY": kKey }
            });
            const data = await r.json();
            const found = data.events || data || [];
            allEvents.push(...found);
        }

        // --- HIER IST DIE ZEILE FÜR CLAUDE ---
        console.log("RAW EVENT SAMPLE:", JSON.stringify(allEvents.slice(0, 5), null, 2));
        // -------------------------------------

        logger.innerHTML += `✅ ${allEvents.length} Events geladen.\nSchau jetzt in die Konsole (F12)!`;
        
    } catch (e) {
        logger.innerHTML += "❌ Fehler: " + e.message;
    }
}

function setup() {
    localStorage.setItem("kKey", prompt("API Key:"));
    localStorage.setItem("kIds", prompt("Kalender IDs:"));
}
if(!localStorage.getItem("kKey")) setup();
</script>
</body>
</html>
