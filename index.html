<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Springer-Dispo Pro v45.3 (Name-Fix)</title>

<style>
:root{
--blue:#2563eb; --blue2:#1d4ed8; --green:#16a34a; --green2:#15803d;
--red:#dc2626; --bg:#eef2f7; --line:#e5e7eb; --text:#111827; --muted:#6b7280;
}
*{box-sizing:border-box;}
body{margin:0;padding:22px;font-family:Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#eef2f7,#dbeafe);color:var(--text);}
.card{max-width:920px;margin:auto;background:#fff;padding:26px;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.10);}
h2{margin:0 0 18px;text-align:center;color:var(--blue);}
label{display:block;margin:12px 0 6px;font-weight:700;font-size:.92rem;}
input,select,textarea{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;font-size:1rem;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.inline{display:flex;align-items:center;gap:10px;margin-top:10px;}
.inline input{width:auto;transform:scale(1.2);}
button{border:none;border-radius:12px;cursor:pointer;font-weight:700;transition:.2s;}
button:hover{transform:translateY(-1px);}
.main-btn{width:100%;padding:15px;margin-top:14px;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;font-size:1rem;}
.setup-btn{width:100%;padding:12px;margin-top:10px;background:#f3f4f6;}
.book-btn{padding:10px 14px;background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;margin-top:8px;}
.log{margin-top:14px;padding:14px;background:#0f172a;color:#4ade80;font-family:Consolas,monospace;border-radius:14px;font-size:.85rem;min-height:58px;white-space:pre-wrap;}
#results{max-width:920px;margin:18px auto;}
.driver{background:#fff;padding:16px;border-radius:18px;margin-bottom:12px;display:flex;justify-content:space-between;gap:15px;align-items:center;box-shadow:0 8px 20px rgba(0,0,0,.06);border-left:8px solid #d1d5db;}
.driver.full-free{border-left-color:var(--green);}
.driver.partial-free{border-left-color:#fbbf24;}
.driver.full-busy{border-left-color:var(--red);background:#fff7f7;}
.day-bar{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.day-dot{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:bold;}
.dot-free{background:var(--green);}
.dot-busy{background:var(--red);}
.state{display:inline-block;padding:4px 8px;border-radius:999px;font-size:.72rem;font-weight:700;color:#fff;margin:4px 0;}
.state.free{background:var(--green);}
.state.partial{background:#fbbf24;color:#92400e;}
.state.busy{background:var(--red);}
.right{min-width:110px;text-align:right;font-size:1.08rem;font-weight:800;}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:2000;justify-content:center;align-items:center;backdrop-filter:blur(4px);}
.modal-box{background:#fff;padding:25px;border-radius:20px;width:95%;max-width:450px;}
</style>
</head>
<body>

<div class="card">
    <h2>Springer-Dispo Pro v45.3</h2>
    <label>Einrichtung / Ziel</label>
    <select id="schoolSelect">
        <option value="">-- Einrichtung wählen --</option>
        <option value="30655">Albert-Liebmann-Schule (30655)</option>
        <option value="30165">Lebenshilfe Büttnerstraße (30165)</option>
        <option value="30900">Kindergarten Domino (30900)</option>
        <option value="30165">Kindergarten - Forst Mecklenheide (30165)</option>
        <option value="30880">Freie Martinschule (30880)</option>
        <option value="30851">Kindergarten Langenhagen (30851)</option>
        <option value="30629">Kindergarten Misburg (30629)</option>
        <option value="31535">Michael-Ende-Schule (31535)</option>
        <option value="31515">Paul-Moor-Schule (31515)</option>
        <option value="30938">Pestalozzi-Schule (30938)</option>
        <option value="31303">Grundschule Otze (31303)</option>
        <option value="31303">Schule am Wasserwerk (31303)</option>
        <option value="31319">Schule im Großen Freien (31319)</option>
        <option value="30900">Unter den Eichen/BOS (30900)</option>
        <option value="30165">Stötzner-Schule (30165)</option>
        <option value="30449">Wilhelm-Schade-Schule (30449)</option>
        <option value="30559">Bildungszentrum für Taubblinde (30559)</option>
        <option value="30900">GS Bissendorf/ Brelingen (30900)</option>
        <option value="30855">Adolf-Reichwein-Schule (30855)</option>
        <option value="30982">Calenberger Schule (30982)</option>
        <option value="30938">Kindergarten Craney (30938)</option>
        <option value="30890">Bert-Brecht-Schule (30890)</option>
        <option value="30853">Gutzmann Schule (30853)</option>
        <option value="30926">Anne Frank Schule (30926)</option>
    </select>

    <label>PLZ Startpunkt</label>
    <input id="startPlz" value="30159">

    <div class="row">
        <div><label>Von</label><input type="date" id="dateFrom" value="2026-04-27"></div>
        <div><label>Bis</label><input type="date" id="dateTo" value="2026-04-30"></div>
    </div>

    <div class="inline">
        <input type="checkbox" id="wholeDay" checked onchange="toggleTime()">
        <label for="wholeDay" style="margin:0;">Ganztägig</label>
    </div>

    <div class="row" id="timeBox" style="display:none;">
        <div><label>Startzeit</label><input type="time" id="startTime" value="07:00"></div>
        <div><label>Endzeit</label><input type="time" id="endTime" value="13:00"></div>
    </div>

    <button class="main-btn" onclick="run()">Verfügbarkeit prüfen & Ranken</button>
    <button class="setup-btn" onclick="setup()">⚙️ Setup</button>
    <div id="log" class="log">Bereit.</div>
</div>

<div id="results"></div>

<div id="bookingModal" class="modal-overlay">
    <div class="modal-box">
        <h3>Tour eintragen</h3>
        <label>Fahrer</label>
        <input type="text" id="popDriver" readonly style="background:#f3f4f6">
        <div class="row">
            <div>
                <label>Wer meldet?</label>
                <select id="nameSelect" onchange="updatePopDesc()">
                    <option value="">-- Melder --</option>
                    <option value="Angela">Angela</option><option value="Anja">Anja</option>
                    <option value="Beate">Beate</option><option value="Bettina">Bettina</option>
                    <option value="Birgit">Birgit</option><option value="Christiane">Christiane</option>
                    <option value="Daniela">Daniela</option><option value="Frank">Frank</option>
                    <option value="Gerhard">Gerhard</option><option value="Heike">Heike</option>
                    <option value="Jürgen">Jürgen</option><option value="Karin">Karin</option>
                    <option value="Katja">Katja</option><option value="Kerstin">Kerstin</option>
                    <option value="Klaus">Klaus</option><option value="Manuela">Manuela</option>
                    <option value="Marion">Marion</option><option value="Michael">Michael</option>
                    <option value="Moni">Moni</option><option value="Nicole">Nicole</option>
                    <option value="Nina">Nina</option><option value="Petra">Petra</option>
                    <option value="Ralf">Ralf</option><option value="Sabine">Sabine</option>
                    <option value="Silke">Silke</option><option value="Steffi">Steffi</option>
                    <option value="Susanne">Susanne</option><option value="Ute">Ute</option>
                </select>
            </div>
            <div>
                <label>Tour</label>
                <select id="tourSelect" onchange="updatePopDesc()"><option value="">-- Tour --</option></select>
            </div>
        </div>
        <label>Zusatz-Info</label>
        <textarea id="popDesc" rows="2"></textarea>
        <div style="margin-top:20px;display:flex;gap:10px;">
            <button onclick="closeModal()" style="background:#eee;flex:1;padding:12px;">Abbruch</button>
            <button onclick="confirmBooking()" style="background:var(--blue);color:#fff;flex:2;padding:12px;">Eintragen</button>
        </div>
    </div>
</div>

<script>
// Korrigierte Namen laut Kalender-Struktur
const drivers = [
    {name:"Aschenbach André",plz:"30989"},{name:"Ohm Lars",plz:"30559"},{name:"Bachmeier Reinhard",plz:"30659"},
    {name:"Isfahan Mozaffaey Hamid",plz:"30519"},{name:"Otto Alexander",plz:"30173"},{name:"Türkel Tuncer",plz:"30161"},
    {name:"Schrader Harald",plz:"30880"},{name:"Neubauer Michael",plz:"30853"},{name:"Ferkau Eckart",plz:"30851"},
    {name:"Bethmann Ekkehard",plz:"31535"},{name:"Hauer Frank",plz:"30900"},{name:"Kruse Jens Roland",plz:"31275"},
    {name:"Grimpe Dirk",plz:"30827"},{name:"Häge Klaus  Dieter",plz:"30519"},{name:"Von Treskow Albrecht",plz:"30659"},
    {name:"Giuseppe Caruso",plz:"30880"},{name:"Popescu Viorel Florinel",plz:"30827"},{name:"Beka Jonel",plz:"31275"},
    {name:"Moser Siegfried",plz:"30827"},{name:"Bodewell Thomas",plz:"30853"}
];

let loadedEvents=[];
let currentDriverForBooking = "";

window.onload=()=>{
    const ts=document.getElementById('tourSelect');
    for(let i=1;i<=40;i++){let o=document.createElement('option');o.value="Tour "+i;o.innerText="Tour "+i;ts.appendChild(o);}
    document.getElementById('schoolSelect').onchange = function() {
        if(this.value) document.getElementById('startPlz').value = this.value;
    };
};

function setup(){
    localStorage.setItem("kKey",prompt("Kalender API Key:",localStorage.getItem("kKey")||""));
    localStorage.setItem("kIds",prompt("Kalender IDs:",localStorage.getItem("kIds")||""));
    localStorage.setItem("gKey",prompt("Google API Key:",localStorage.getItem("gKey")||""));
    location.reload();
}

function log(txt){document.getElementById("log").textContent=txt;}
function toggleTime(){document.getElementById("timeBox").style.display=document.getElementById("wholeDay").checked?"none":"grid";}
function safe(t){return t ? t.replace(/'/g,"\\'") : "";}

async function run(){
    try{
        const kKey=localStorage.getItem("kKey"), kIds=localStorage.getItem("kIds"), gKey=localStorage.getItem("gKey");
        if(!kKey || !kIds || !gKey){alert("Setup fehlt.");return;}
        const from=document.getElementById("dateFrom").value, to=document.getElementById("dateTo").value, start=document.getElementById("startPlz").value;
        
        log("⏳ Abfrage läuft...");
        loadedEvents=await loadEvents(from,to,kIds,kKey);
        await loadGoogle(gKey);
        const matrix=await getDistances(start);
        const dateRange = getDateRange(from, to);

        let ranking=drivers.map((d,i)=>{
            const dayStates = checkDriverDays(d.name, dateRange, loadedEvents);
            const freeCount = dayStates.filter(ds => !ds.busy).length;
            const el=matrix.rows[i].elements[0];
            return {
                ...d,
                dayStates: dayStates,
                freeCount: freeCount,
                totalDays: dateRange.length,
                distText: el.status==="OK" ? el.distance.text : "-",
                distVal: el.status==="OK" ? el.distance.value : 999999
            };
        });

        ranking.sort((a,b) => (b.freeCount - a.freeCount) || (a.distVal - b.distVal));
        render(ranking);
        log("✅ Fertig.");
    }catch(e){log("❌ Fehler: "+e.message);}
}

function getDateRange(start, end) {
    let d = [], c = new Date(start), l = new Date(end);
    while(c <= l) { d.push(c.toISOString().split('T')[0]); c.setDate(c.getDate()+1); }
    return d;
}

function checkDriverDays(name, range, events) {
    // Nimmt nur den Nachnamen (erstes Wort) für den Vergleich
    const lastName = name.split(' ')[0].toLowerCase().trim();
    
    return range.map(date => {
        const hit = events.find(ev => {
            const dateMatch = ev.startDate.split(' ')[0] === date;
            let nameMatch = false;
            if(ev.subCalendars && Array.isArray(ev.subCalendars)) {
                nameMatch = ev.subCalendars.some(sc => {
                    const scLower = sc.toLowerCase();
                    // Wenn der Nachname im Unterkalender vorkommt -> Treffer
                    return scLower.includes(lastName);
                });
            }
            return dateMatch && nameMatch;
        });
        return { date: date, busy: !!hit, reason: hit ? hit.title : "" };
    });
}

async function loadEvents(from,to,kIds,kKey){
    let all=[];
    for(const id of kIds.split(",")){
        const url=`https://api.kalender.digital/public/event?calendarId=${id.trim()}&startDate=${from}&endDate=${to}T23:59:59&timeZone=Europe/Berlin`;
        const r=await fetch("https://corsproxy.io/?"+encodeURIComponent(url),{headers:{"X-API-KEY":kKey}});
        if(r.ok){ const d=await r.json(); all.push(...(Array.isArray(d)?d:(d.events||[]))); }
    }
    return all;
}

function loadGoogle(key){
    return new Promise(resolve=>{
        if(typeof google!=="undefined")return resolve();
        const s=document.createElement("script");s.src=`https://maps.googleapis.com/maps/api/js?key=${key}`;s.onload=resolve;document.head.appendChild(s);
    });
}

function getDistances(start){
    return new Promise((resolve,reject)=>{
        new google.maps.DistanceMatrixService().getDistanceMatrix({origins:drivers.map(d=>d.plz),destinations:[start],travelMode:"DRIVING"},(res,status)=>{
            if(status!=="OK") reject(new Error("Google Fehler")); else resolve(res);
        });
    });
}

function render(list){
    document.getElementById("results").innerHTML=list.map(d=>{
        const isFullFree = d.freeCount === d.totalDays;
        const isFullBusy = d.freeCount === 0;
        const stateClass = isFullFree ? 'free' : (isFullBusy ? 'busy' : 'partial');
        const stateText = isFullFree ? 'VOLL FREI' : (isFullBusy ? 'KEINE ZEIT' : `${d.freeCount}/${d.totalDays} TAGE FREI`);

        return `
        <div class="driver ${isFullFree?'full-free':(isFullBusy?'full-busy':'partial-free')}">
            <div>
                <strong>${d.name}</strong><br>
                <span class="state ${stateClass}">${stateText}</span>
                <div class="day-bar">
                    ${d.dayStates.map(ds => `
                        <div class="day-dot ${ds.busy?'dot-busy':'dot-free'}" title="${ds.date}: ${ds.busy ? ds.reason : 'Frei'}">
                            ${ds.date.split('-')[2]}
                        </div>
                    `).join("")}
                </div>
                <button class="book-btn" onclick="openModal('${safe(d.name)}')">BUCHEN</button>
            </div>
            <div class="right">${d.distText}</div>
        </div>`;
    }).join("");
}

function openModal(name){
    currentDriverForBooking = name;
    document.getElementById('popDriver').value = name;
    document.getElementById('bookingModal').style.display = 'flex';
}
function closeModal(){document.getElementById('bookingModal').style.display = 'none';}
function updatePopDesc(){
    const n=document.getElementById('nameSelect').value, t=document.getElementById('tourSelect').value;
    document.getElementById('popDesc').value=(n?n+" meldet: ":"")+(t?t:"");
}

async function confirmBooking(){
    const kKey=localStorage.getItem("kKey"),from=document.getElementById("dateFrom").value,to=document.getElementById("dateTo").value,whole=document.getElementById("wholeDay").checked,school=document.getElementById('schoolSelect').selectedOptions[0].text;
    const desc = document.getElementById('popDesc').value;
    closeModal();
    try{
        const payload={
            startDate:whole?`${from} 00:00:00`:`${from} ${document.getElementById("startTime").value}:00`,
            endDate:whole?`${to} 23:59:59`:`${to} ${document.getElementById("endTime").value}:00`,
            timeZone:"Europe/Berlin",title:school,description:desc,wholeDay:whole,subCalendars:[currentDriverForBooking]
        };
        const r=await fetch("https://corsproxy.io/?"+encodeURIComponent("https://api.kalender.digital/public/event"),{
            method:"POST",headers:{"Content-Type":"application/json","X-API-KEY":kKey},body:JSON.stringify(payload)
        });
        if(r.ok){ alert("✅ Eingetragen!"); run(); } else throw new Error("Fehler.");
    }catch(e){ alert("❌ Fehler: "+e.message); }
}
</script>
</body>
</html>
