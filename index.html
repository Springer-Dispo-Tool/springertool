<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Springer-Dispo Pro v46.8 - FULL LIST</title>
<style>
:root{ --blue:#2563eb; --blue2:#1d4ed8; --green:#16a34a; --red:#dc2626; --orange:#f59e0b; --bg:#eef2f7; --card:#ffffff; --text:#111827; --muted:#6b7280; }
*{box-sizing:border-box}
body{margin:0;padding:20px;font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#eef2f7,#dbeafe);color:var(--text);}
.card{max-width:980px;margin:auto;background:rgba(255,255,255,.96);padding:26px;border-radius:24px;box-shadow:0 20px 50px rgba(0,0,0,.08);}
h2{margin:0 0 18px;text-align:center;color:var(--blue);font-size:1.8rem;}
label{display:block;margin:12px 0 6px;font-weight:700;font-size:.9rem;}
input,select{width:100%;padding:12px;border:1px solid #dbe3ee;border-radius:12px;font-size:1rem;background:#fff;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
button{border:none;border-radius:12px;cursor:pointer;font-weight:700;transition:.2s;}
.main-btn{width:100%;padding:15px;margin-top:15px;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;font-size:1rem;}
.setup-btn{width:100%;padding:10px;margin-top:10px;background:#f3f4f6;color:var(--muted);}
.log{margin-top:14px;padding:12px;background:#0f172a;color:#4ade80;font-family:monospace;border-radius:12px;font-size:.8rem;min-height:45px;white-space:pre-wrap;}
#results{max-width:980px;margin:18px auto;}
.driver{background:#fff;padding:18px;border-radius:20px;margin-bottom:12px;display:flex;justify-content:space-between;gap:15px;align-items:center;box-shadow:0 8px 20px rgba(0,0,0,.05);border-left:10px solid #d1d5db;}
.driver.good{border-left-color:var(--green)}
.driver.mid{border-left-color:var(--orange)}
.driver.full{border-left-color:var(--red);background:#fff7f7}
.name{font-weight:800;font-size:1.1rem;margin-bottom:4px;}
.daybar{display:flex;gap:6px;margin-top:12px;}
.day{width:35px;height:35px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:800;color:#fff;}
.free{background:var(--green)}
.busy{background:var(--red)}
.dist{font-size:1.2rem;font-weight:800;color:var(--blue);}
</style>
</head>
<body>

<div class="card">
    <h2>Springer-Dispo Pro v46.8</h2>
    
    <label>Einrichtung wählen</label>
    <select id="schoolSelect" onchange="if(this.value) { document.getElementById('startPlz').value=this.value; }">
        <option value="">-- Bitte wählen --</option>
        <option value="30655">Albert-Liebmann-Schule (30655)</option>
        <option value="30165">Lebenshilfe Büttnerstraße (30165)</option>
        <option value="30900">Kindergarten Domino (30900)</option>
        <option value="30880">Freie Martinschule (30880)</option>
        <option value="30851">Kindergarten Langenhagen (30851)</option>
        <option value="30853">Gutzmann Schule (30853)</option>
        <option value="30926">Anne Frank Schule (30926)</option>
        <option value="30827">Ilmasi Schule (30827)</option>
        <option value="31535">Michael-Ende-Schule (31535)</option>
        <option value="31303">Schule am Wasserwerk (31303)</option>
        <option value="31319">Schule im Großen Freien (31319)</option>
        <option value="30419">Peter-Cushing-Schule (30419)</option>
        <option value="30625">Karl-König-Schule (30625)</option>
        <option value="30629">Mira-Lobe-Schule (30629)</option>
        <option value="30453">Paul-Dohrmann-Schule (30453)</option>
        <option value="30519">Erich-Kästner-Schule (30519)</option>
    </select>

    <label>PLZ Startpunkt</label>
    <input id="startPlz" value="30159">

    <div class="row">
        <div><label>Von</label><input type="date" id="dateFrom" value="2026-04-27"></div>
        <div><label>Bis</label><input type="date" id="dateTo" value="2026-04-30"></div>
    </div>

    <button class="main-btn" onclick="run()">Abfrage starten</button>
    <button class="setup-btn" onclick="setup()">⚙️ Setup (Keys)</button>
    <div id="log" class="log">Bereit.</div>
</div>

<div id="results"></div>

<script>
const drivers = [
    {name:"Aschenbach André",plz:"30989"}, {name:"Ohm Lars",plz:"30559"},
    {name:"Bachmeier Reinhard",plz:"30659"}, {name:"Isfahan Mozaffaey Hamid",plz:"30519"},
    {name:"Otto Alexander",plz:"30173"}, {name:"Türkel Tuncer",plz:"30161"},
    {name:"Schrader Harald",plz:"30880"}, {name:"Neubauer Michael",plz:"30853"},
    {name:"Ferkau Eckart",plz:"30851"}, {name:"Bethmann Ekkehard",plz:"31535"},
    {name:"Hauer Frank",plz:"30900"}, {name:"Kruse Jens Roland",plz:"31275"},
    {name:"Grimpe Dirk",plz:"30827"}, {name:"Häge Klaus Dieter",plz:"30519"},
    {name:"Von Treskow Albrecht",plz:"30659"}, {name:"Giuseppe Caruso",plz:"30880"},
    {name:"Popescu Viorel Florinel",plz:"30827"}, {name:"Beka Jonel",plz:"31275"},
    {name:"Moser Siegfried",plz:"30827"}, {name:"Bodewell Thomas",plz:"30853"}
];

let loadedEvents = [];

function clean(s){ return (s||"").toLowerCase().replace(/[^a-z0-9]/g,""); }

async function run(){
    const kKey = localStorage.getItem("kKey"), kIds = localStorage.getItem("kIds"), gKey = localStorage.getItem("gKey");
    if(!kKey || !kIds || !gKey) return alert("Setup unvollständig!");

    log("⏳ Lade Daten...");
    loadedEvents = await loadEvents(dateFrom.value, dateTo.value, kIds, kKey);
    
    await loadGoogle(gKey);
    const matrix = await getDistances(startPlz.value);
    
    let days = [];
    let startParts = dateFrom.value.split("-");
    let endParts = dateTo.value.split("-");
    let current = new Date(startParts[0], startParts[1]-1, startParts[2], 12, 0, 0);
    let end = new Date(endParts[0], endParts[1]-1, endParts[2], 12, 0, 0);

    while(current <= end){
        days.push(current.toISOString().split('T')[0]);
        current.setDate(current.getDate() + 1);
    }

    let ranking = drivers.map((d, i) => {
        const dayStates = days.map(day => {
            const isBusy = loadedEvents.some(ev => {
                const combinedInfo = clean((ev.subCalendars || []).join("") + ev.title);
                const match = combinedInfo.includes(clean(d.name));
                const evStart = ev.startDate.split(" ")[0];
                const evEnd = ev.endDate.split(" ")[0];
                return match && (day >= evStart && day <= evEnd);
            });
            return { day, isBusy };
        });

        const freeCount = dayStates.filter(s => !s.isBusy).length;
        const el = matrix.rows[i].elements[0];
        return { ...d, dayStates, freeCount, distText: el.status==="OK"?el.distance.text:"-", distVal: el.status==="OK"?el.distance.value:999999 };
    });

    ranking.sort((a,b) => (b.freeCount - a.freeCount) || (a.distVal - b.distVal));
    render(ranking);
    log("✅ Abfrage beendet.");
}

async function loadEvents(f, t, ids, key){
    let all = [];
    for(const id of ids.split(",")){
        const url = `https://api.kalender.digital/public/event?calendarId=${id.trim()}&startDate=${f}&endDate=${t}T23:59:59&timeZone=Europe/Berlin`;
        const r = await fetch("https://corsproxy.io/?" + encodeURIComponent(url), {headers:{"X-API-KEY":key}});
        const data = await r.json();
        all.push(...(data.events || data || []));
    }
    return all;
}

function render(list){
    document.getElementById("results").innerHTML = list.map(d => {
        let cls = d.freeCount === 0 ? "full" : (d.freeCount === d.dayStates.length ? "good" : "mid");
        return `<div class="driver ${cls}">
            <div>
                <div class="name">${d.name}</div>
                <div class="daybar">${d.dayStates.map(s => `<div class="day ${s.isBusy?'busy':'free'}">${s.day.split("-")[2]}</div>`).join("")}</div>
            </div>
            <div style="text-align:right"><div class="dist">${d.distText}</div></div>
        </div>`;
    }).join("");
}

function loadGoogle(k){ return new Promise(res => { if(window.google) return res(); const s=document.createElement("script"); s.src=`https://maps.googleapis.com/maps/api/js?key=${k}`; s.onload=res; document.head.appendChild(s); }); }
function getDistances(dest){ return new Promise(res => { new google.maps.DistanceMatrixService().getDistanceMatrix({origins:drivers.map(d=>d.plz),destinations:[dest],travelMode:'DRIVING'}, r => res(r)); }); }
function log(t){ document.getElementById("log").textContent = t; }

function setup(){
    localStorage.setItem("kKey", prompt("1. Kalender API Key:", localStorage.getItem("kKey")||""));
    localStorage.setItem("kIds", prompt("2. Kalender IDs:", localStorage.getItem("kIds")||""));
    localStorage.setItem("gKey", prompt("3. Google Maps Key:", localStorage.getItem("gKey")||""));
    location.reload();
}
</script>
</body>
</html>
