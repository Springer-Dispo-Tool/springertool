<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Springer Dispo - Professional</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --blue: #2563eb; --green: #16a34a; --bg: #f1f5f9; --card-bg: #ffffff; --text: #1e293b; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 15px; margin: 0; color: var(--text); }
        .card { background: var(--card-bg); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; border: 1px solid #e2e8f0; }
        h2 { margin: 0 0 15px 0; font-size: 1.2rem; }
        label { display: block; font-size: 0.8rem; font-weight: 600; color: #64748b; margin-bottom: 6px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; }
        .btn-calc { background: var(--green); color: white; margin-top: 10px; }
        #status { text-align: center; color: var(--blue); margin: 20px 0; font-weight: 600; }
        .res-item { background: white; padding: 16px; border-radius: 14px; margin-bottom: 10px; border-left: 6px solid var(--blue); display: flex; justify-content: space-between; align-items: center; }
        .best { border-left-color: var(--green); background: #f0fdf4; }
        .dist-pill { background: #e2e8f0; padding: 6px 12px; border-radius: 20px; font-weight: 800; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🔑 Setup</h2>
        <label>Google API Key</label>
        <input type="password" id="apiKey" placeholder="Key hier einfügen">
        <button class="btn" style="background:#64748b; color:white;" onclick="saveAndReload()">KEY SPEICHERN & STARTEN</button>
    </div>

    <div class="card">
        <h2>📍 Tour-Eingabe</h2>
        <input id="startPos" placeholder="Abholort (PLZ)">
        <input id="schoolPos" placeholder="Zielort (Schule)">
        <button class="btn btn-calc" onclick="calculateDistances()">🚀 RANKING ERSTELLEN</button>
    </div>

    <div id="status">Warte auf API Key...</div>
    <div id="results"></div>

<script>
const staticDrivers = [
    { name: "Aschenbach André", plz: "30989", ort: "Gehrden" },
    { name: "Ohm Lars", plz: "30559", ort: "Hannover Anderten" },
    { name: "Bachmeier Reinhard", plz: "30659", ort: "Hannover Bothfeld" },
    { name: "Isfahan Mozaffaey Hamid", plz: "30519", ort: "Hannover Döhren Wülfel" },
    { name: "Otto Alexander", plz: "30173", ort: "Hannover Südstadt" },
    { name: "Türkel Tuncer", plz: "30161", ort: "Hannover Vahrenwald" },
    { name: "Schrader Harald", plz: "30880", ort: "Laatzen" },
    { name: "Neubauer Michael", plz: "30853", ort: "Langenhagen" },
    { name: "Ferkau Eckart", plz: "30851", ort: "Langenhagen" },
    { name: "Bethmann Ekkehard", plz: "31535", ort: "Neustadt-Helstorf" },
    { name: "Hauer Frank", plz: "30900", ort: "Wedemark Oegenbostel" },
    { name: "Kruse Jens Roland", plz: "31275", ort: "Lehrte" },
    { name: "Grimpe Dirk", plz: "30823", ort: "Garbsen" },
    { name: "Häge Klaus Dieter", plz: "30519", ort: "Döhren" },
    { name: "Von Treskow Albrecht", plz: "30659", ort: "Bothfeld" },
    { name: "Caruso Guiseppe", plz: "30880", ort: "Laatzen" },
    { name: "Popescu Viorel", plz: "30827", ort: "Garbsen" },
    { name: "Beka Jonel", plz: "31275", ort: "Lehrte" }
];

function saveAndReload() {
    const key = document.getElementById("apiKey").value.trim();
    if(key) {
        localStorage.setItem("gmaps_key", key);
        location.reload();
    }
}

// Lade die Google API offiziell
const savedKey = localStorage.getItem("gmaps_key");
if (savedKey) {
    document.getElementById("apiKey").value = savedKey;
    document.getElementById("status").innerText = "API bereit. Tour eingeben.";
    const script = document.createElement('script');
    script.src = `https://maps.googleapis.com/maps/api/js?key=${savedKey}&libraries=geometry`;
    document.head.appendChild(script);
}

function calculateDistances() {
    const start = document.getElementById("startPos").value;
    const school = document.getElementById("schoolPos").value;
    const stat = document.getElementById("status");
    const resDiv = document.getElementById("results");

    if (!window.google) return alert("API noch nicht geladen oder Key falsch!");

    stat.innerText = "Berechne...";
    resDiv.innerHTML = "";
    
    const service = new google.maps.DistanceMatrixService();
    const driverAddresses = staticDrivers.map(d => `${d.plz} ${d.ort}, Germany`);

    // Anfrage 1: Fahrer -> Start
    service.getDistanceMatrix({
        origins: driverAddresses,
        destinations: [start],
        travelMode: 'DRIVING'
    }, (response1, status1) => {
        if (status1 !== "OK") return stat.innerText = "Fehler: " + status1;

        // Anfrage 2: Schule -> Fahrer
        service.getDistanceMatrix({
            origins: [school],
            destinations: driverAddresses,
            travelMode: 'DRIVING'
        }, (response2, status2) => {
            if (status2 !== "OK") return stat.innerText = "Fehler: " + status2;

            let results = [];
            staticDrivers.forEach((driver, i) => {
                const d1 = response1.rows[i].elements[0].distance?.value || 0;
                const d2 = response2.rows[0].elements[i].distance?.value || 0;
                results.push({
                    name: driver.name,
                    km: (d1 + d2) / 1000,
                    loc: `${driver.plz} ${driver.ort}`
                });
            });

            results.sort((a, b) => a.km - b.km);
            stat.innerText = "Ergebnis:";
            results.forEach((r, i) => {
                const item = document.createElement("div");
                item.className = "res-item" + (i === 0 ? " best" : "");
                item.innerHTML = `<div><b>${i+1}. ${r.name}</b><br><small>${r.loc}</small></div><div class="dist-pill">${r.km.toFixed(1)} km</div>`;
                resDiv.appendChild(item);
            });
        });
    });
}
</script>
</body>
</html>
