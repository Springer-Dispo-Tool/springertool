<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Springer-Dispo Pro v45.12</title>
<style>
:root{--blue:#2563eb;--green:#16a34a;--red:#dc2626;--bg:#eef2f7;--text:#111827;}
*{box-sizing:border-box;}
body{margin:0;padding:20px;font-family:sans-serif;background:var(--bg);color:var(--text);}
.card{max-width:920px;margin:auto;background:#fff;padding:25px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1);}
h2{text-align:center;color:var(--blue);}
label{display:block;margin:10px 0 5px;font-weight:bold;}
input,select,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:10px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
button{border:none;border-radius:10px;cursor:pointer;font-weight:bold;transition:0.2s;}
.main-btn{width:100%;padding:15px;margin-top:15px;background:var(--blue);color:#fff;}
.book-btn{padding:8px;background:var(--green);color:#fff;margin-top:8px;}
.log{margin-top:15px;padding:12px;background:#0f172a;color:#4ade80;font-family:monospace;border-radius:10px;font-size:0.8rem;min-height:50px;}
#results{max-width:920px;margin:20px auto;}
.driver{background:#fff;padding:15px;border-radius:15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;border-left:8px solid #ccc;box-shadow:0 5px 15px rgba(0,0,0,0.05);}
.free{border-left-color:var(--green);}.busy{border-left-color:var(--red);background:#fff5f5;}
.day-bar{display:flex;gap:4px;margin-top:8px;}
.day-dot{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:bold;}
.dot-free{background:var(--green);}.dot-busy{background:var(--red);}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:2000;justify-content:center;align-items:center;}
.modal-box{background:#fff;padding:25px;border-radius:20px;width:90%;max-width:400px;}
</style>
</head>
<body>

<div class="card">
    <h2>Springer-Dispo Pro v45.12</h2>
    <label>Einrichtung</label>
    <select id="schoolSelect" onchange="if(this.value)document.getElementById('startPlz').value=this.value">
        <option value="">-- Wählen --</option>
        <option value="30655">Albert-Liebmann-Schule (30655)</option>
        <option value="30165">Lebenshilfe Büttnerstraße (30165)</option>
        <option value="30900">Kindergarten Domino (30900)</option>
        <option value="30880">Freie Martinschule (30880)</option>
        <option value="30851">Kindergarten Langenhagen (30851)</option>
        <option value="30629">Kindergarten Misburg (30629)</option>
        <option value="31535">Michael-Ende-Schule (31535)</option>
        <option value="31515">Paul-Moor-Schule (31515)</option>
        <option value="30938">Pestalozzi-Schule (30938)</option>
        <option value="30853">Gutzmann Schule (30853)</option>
        <option value="30926">Anne Frank Schule (30926)</option>
        <option value="30827">Ilmasi Schule (30827)</option>
    </select>
    <label>PLZ Start</label>
    <input id="startPlz" value="30159">
    <div class="row">
        <div><label>Von</label><input type="date" id="dateFrom" value="2026-04-27"></div>
        <div><label>Bis</label><input type="date" id="dateTo" value="2026-04-30"></div>
    </div>
    <button class="main-btn" onclick="run()">Prüfen & Ranken</button>
    <button style="width:100%;margin-top:10px;background:#eee;padding:8px;" onclick="setup()">⚙️ Setup</button>
    <div id="log" class="log">Bereit.</div>
</div>

<div id="results"></div>

<div id="bookingModal" class="modal-overlay">
    <div class="modal-box">
        <h3>Buchung</h3>
        <input type="text" id="popDriver" readonly style="background:#f3f4f6;margin-bottom:10px;">
        <select id="nameSelect"><option value="Zentrale">Zentrale</option></select>
        <textarea id="popDesc" placeholder="Info" style="margin-top:10px;"></textarea>
        <div style="margin-top:15px;display:flex;gap:10px;">
            <button onclick="closeModal()" style="background:#eee;flex:1;">Abbruch</button>
            <button onclick="confirmBooking()" style="background:var(--blue);color:#fff;flex:2;padding:10px;">Buchen</button>
        </div>
    </div>
</div>

<script>
const drivers = [
    {name:"Aschenbach André",plz:"30989"},{name:"Ohm Lars",plz:"30559"},{name:"Bachmeier Reinhard",plz:"30659"},
    {name:"Isfahan Mozaffaey Hamid",plz:"30519"},{name:"Otto Alexander",plz:"30173"},{name:"Türkel Tuncer",plz:"30161"},
    {name:"Schrader Harald",plz:"30880"},{name:"Neubauer Michael",plz:"30853"},{name:"Ferkau Eckart",plz:"30851"},
    {name:"Bethmann Ekkehard",plz:"31535"},{name:"Hauer Frank",plz:"30900"},{name:"Kruse Jens Roland",plz:"31275"},
    {name:"Grimpe Dirk",plz:"30827"},{name:"Häge Klaus  Dieter",plz:"30519"},{name:"Von Treskow Albrecht",plz:"30659"},
    {name:"Giuseppe Caruso",plz:"30880"},{name:"Popescu Viorel Florinel",plz:"30827"},{name:"Beka Jonel",plz:"31275"},
    {name:"Moser Siegfried",plz:"30827"},{name:"Bodewell Thomas",plz:"30853"}
];

let loadedEvents = [];
let currentDriver = "";

// Hilfsfunktion: Bereinigt Namen extrem (entfernt Leerzeichen & Sonderzeichen)
function clean(s) {
    return s.toLowerCase().replace(/[^a-z]/g, "");
}

async function run(){
    const kKey=localStorage.getItem("kKey"), kIds=localStorage.getItem("kIds"), gKey=localStorage.getItem("gKey");
    if(!kKey || !kIds || !gKey) return alert("Setup!");
    
    document.getElementById("log").textContent = "⏳ Lade Daten...";
    loadedEvents = await loadEvents(document.getElementById("dateFrom").value, document.getElementById("dateTo").value, kIds, kKey);
    
    await loadGoogle(gKey);
    const matrix = await getDistances(document.getElementById("startPlz").value);
    const range = getDateRange(document.getElementById("dateFrom").value, document.getElementById("dateTo").value);

    let ranking = drivers.map((d, i) => {
        const dayStates = range.map(date => {
            const search = clean(d.name);
            const hit = loadedEvents.find(ev => {
                if(ev.startDate.split(' ')[0] !== date) return false;
                const calStr = clean((ev.subCalendars || []).join(""));
                return calStr.includes(search);
            });
            return { date, busy: !!hit, reason: hit ? hit.title : "" };
        });
        const dist = matrix.rows[i].elements[0];
        return { ...d, dayStates, freeCount: dayStates.filter(s=>!s.busy).length, distText: dist.status==="OK"?dist.distance.text:"-", distVal: dist.status==="OK"?dist.distance.value:999999 };
    });

    ranking.sort((a,b) => (b.freeCount - a.freeCount) || (a.distVal - b.distVal));
    render(ranking);
    document.getElementById("log").textContent = "✅ Bereit.";
}

async function loadEvents(f, t, ids, key) {
    let all = [];
    for(const id of ids.split(",")) {
        const url = `https://api.kalender.digital/public/event?calendarId=${id.trim()}&startDate=${f}&endDate=${t}T23:59:59&timeZone=Europe/Berlin&_=${Date.now()}`;
        const r = await fetch("https://corsproxy.io/?" + encodeURIComponent(url), {headers:{"X-API-KEY":key}});
        const d = await r.json();
        all.push(...(d.events || d || []));
    }
    return all;
}

function loadGoogle(k){ return new Promise(res => { if(window.google) return res(); const s=document.createElement("script"); s.src=`https://maps.googleapis.com/maps/api/js?key=${k}`; s.onload=res; document.head.appendChild(s); }); }
function getDistances(dest){ return new Promise(res => { new google.maps.DistanceMatrixService().getDistanceMatrix({origins:drivers.map(d=>d.plz),destinations:[dest],travelMode:'DRIVING'}, r => res(r)); }); }
function getDateRange(s,e){ let curr=new Date(s), end=new Date(e), r=[]; while(curr<=end){r.push(curr.toISOString().split('T')[0]); curr.setDate(curr.getDate()+1);} return r; }

function render(list) {
    document.getElementById("results").innerHTML = list.map(d => `
        <div class="driver ${d.freeCount===d.dayStates.length?'free':(d.freeCount===0?'busy':'')}">
            <div>
                <strong>${d.name}</strong><br>
                <div class="day-bar">${d.dayStates.map(s=>`<div class="day-dot ${s.busy?'dot-busy':'dot-free'}">${s.date.split('-')[2]}</div>`).join('')}</div>
                ${d.freeCount>0?`<button class="book-btn" onclick="openModal('${d.name.replace(/'/g,"\\'")}')">BUCHEN</button>`:''}
            </div>
            <div style="font-weight:bold">${d.distText}</div>
        </div>`).join("");
}

function openModal(n){ currentDriver=n; document.getElementById('popDriver').value=n; document.getElementById('bookingModal').style.display='flex'; }
function closeModal(){ document.getElementById('bookingModal').style.display='none'; }
function setup(){ localStorage.setItem("kKey",prompt("API Key",localStorage.getItem("kKey"))); localStorage.setItem("kIds",prompt("Kalender IDs",localStorage.getItem("kIds"))); localStorage.setItem("gKey",prompt("Google Key",localStorage.getItem("gKey"))); location.reload(); }

async function confirmBooking(){
    const payload = {
        startDate: document.getElementById("dateFrom").value + " 00:00:00",
        endDate: document.getElementById("dateTo").value + " 23:59:59",
        title: document.getElementById('schoolSelect').selectedOptions[0].text,
        description: document.getElementById('popDesc').value,
        wholeDay: true, subCalendars: [currentDriver], timeZone: "Europe/Berlin"
    };
    closeModal();
    const r = await fetch("https://corsproxy.io/?" + encodeURIComponent("https://api.kalender.digital/public/event"), {
        method:"POST", headers:{"Content-Type":"application/json","X-API-KEY":localStorage.getItem("kKey")}, body:JSON.stringify(payload)
    });
    if(r.ok){ alert("OK"); run(); }
}
</script>
</body>
</html>
