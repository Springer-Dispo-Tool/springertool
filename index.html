<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Springer-Dispo Pro v53.0</title>
<style>
:root{ --blue:#2563eb; --green:#16a34a; --red:#dc2626; --orange:#f59e0b; --bg:#eef2f7; --text:#111827; }
body{margin:0;padding:20px;font-family:Segoe UI,sans-serif;background:var(--bg);color:var(--text);}
.card{max-width:920px;margin:auto;background:#fff;padding:26px;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.10);}
h2{margin:0 0 18px;text-align:center;color:var(--blue);}
label{display:block;margin:12px 0 6px;font-weight:700;}
input,select,textarea{width:100%;padding:12px;border:1px solid #ccc;border-radius:12px;margin-bottom:10px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
button{border:none;border-radius:12px;cursor:pointer;font-weight:700;transition:.2s;}
.main-btn{width:100%;padding:15px;background:var(--blue);color:#fff;font-size:1rem;}
.log{margin-top:14px;padding:14px;background:#0f172a;color:#4ade80;font-family:monospace;border-radius:14px;font-size:.85rem;min-height:80px;white-space:pre-wrap;overflow-y:auto;max-height:200px;}
.driver{background:#fff;padding:16px;border-radius:18px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 8px 20px rgba(0,0,0,0.06);border-left:8px solid #ccc;}
.all-free{border-left-color:var(--green);}
.part-free{border-left-color:var(--orange);}
.full-busy{border-left-color:var(--red);}
.day-strip{display:flex;gap:5px;margin-top:8px;}
.day-box{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:bold;color:#fff;}
.day-free{background:var(--green);}
.day-busy{background:var(--red);}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:2000;justify-content:center;align-items:center;backdrop-filter:blur(4px);}
.modal-box{background:#fff;padding:25px;border-radius:20px;width:95%;max-width:450px;}
</style>
</head>
<body>

<div class="card">
    <h2>Springer-Dispo Pro v53.0</h2>
    
    <label>Einrichtung</label>
    <select id="schoolSelect" onchange="if(this.value)document.getElementById('startPlz').value=this.value">
        <option value="">-- wählen --</option>
        <option value="30655">Albert-Liebmann-Schule (30655)</option>
        <option value="30827">Ilmasi Schule (30827)</option>
        <option value="30853">Gutzmann Schule (30853)</option>
        <option value="31535">Michael-Ende-Schule (31535)</option>
        <option value="30165">Stötzner-Schule (30165)</option>
    </select>

    <label>PLZ Start</label>
    <input id="startPlz" value="30159">

    <div class="row">
        <div><label>Von</label><input type="date" id="dateFrom" value="2026-04-27"></div>
        <div><label>Bis</label><input type="date" id="dateTo" value="2026-04-30"></div>
    </div>

    <button class="main-btn" onclick="run()">Abfrage starten</button>
    <button onclick="setup()" style="width:100%;background:#f3f4f6;padding:10px;margin-top:10px;border-radius:12px;">⚙️ API Setup</button>
    <div id="log" class="log">Bereit.</div>
</div>

<div id="results" style="margin-top:20px;"></div>

<div id="bookingModal" class="modal-overlay">
    <div class="modal-box">
        <h3>Tour buchen</h3>
        <input type="text" id="popDriver" readonly style="background:#f3f4f6">
        <div class="row">
            <select id="nameSelect"><option value="Angela">Angela</option><option value="Christoph">Christoph</option></select>
            <select id="tourSelect"></select>
        </div>
        <textarea id="popDesc" rows="2" placeholder="Zusatz-Info"></textarea>
        <button onclick="confirmBooking()" style="background:var(--blue);color:#fff;width:100%;padding:12px;margin-top:10px;">Eintragen</button>
        <button onclick="closeModal()" style="background:#eee;width:100%;padding:10px;margin-top:5px;">Abbruch</button>
    </div>
</div>

<script>
const drivers = [
    {name:"Aschenbach André",plz:"30989"},{name:"Ohm Lars",plz:"30559"},{name:"Bachmeier Reinhard",plz:"30659"},
    {name:"Isfahan Mozaffaey Hamid",plz:"30519"},{name:"Otto Alexander",plz:"30173"},{name:"Türkel Tuncer",plz:"30161"},
    {name:"Schrader Harald",plz:"30880"},{name:"Neubauer Michael",plz:"30853"},{name:"Ferkau Eckart",plz:"30851"},
    {name:"Bethmann Ekkehard",plz:"31535"},{name:"Hauer Frank",plz:"30900"},{name:"Kruse Jens Roland",plz:"31275"},
    {name:"Grimpe Dirk",plz:"30827"},{name:"Häge Klaus Dieter",plz:"30519"},{name:"Von Treskow Albrecht",plz:"30659"},
    {name:"Giuseppe Caruso",plz:"30880"},{name:"Popescu Viorel Florinel",plz:"30827"},{name:"Beka Jonel",plz:"31275"},
    {name:"Moser Siegfried",plz:"30827"},{name:"Bodewell Thomas",plz:"30853"}
];

window.onload=()=>{
    const ts=document.getElementById('tourSelect');
    for(let i=1;i<=40;i++){let o=document.createElement('option');o.value="Tour "+i;o.innerText="Tour "+i;ts.appendChild(o);}
};

async function run(){
    const kKey=localStorage.getItem("kKey"), kIds=localStorage.getItem("kIds");
    if(!kKey || !kIds) return alert("Setup fehlt!");
    
    const logger = document.getElementById("log");
    const from = document.getElementById("dateFrom").value;
    const to = document.getElementById("dateTo").value;
    
    logger.innerHTML = `📅 Starte Abfrage von ${from} bis ${to}...\n`;
    
    let allEvents = [];
    try {
        for(const id of kIds.split(",")){
            const url = `https://api.kalender.digital/public/event?startDate=${from}&endDate=${to}&timeZone=Europe/Berlin`;
            const proxy = "https://corsproxy.io/?" + encodeURIComponent(url);
            const r = await fetch(proxy, {headers:{"X-API-KEY":kKey}});
            const data = await r.json();
            const found = data.events || data || [];
            allEvents.push(...found);
            logger.innerHTML += `📥 Kalender ${id.trim().substring(0,5)}... geladen (${found.length} Termine)\n`;
        }
    } catch(e) { logger.innerHTML += `❌ Fehler: ${e.message}\n`; }

    let days = [];
    let cur = new Date(from);
    let endD = new Date(to);
    while(cur <= endD){ days.push(cur.toISOString().split('T')[0]); cur.setDate(cur.getDate()+1); }

    let ranking = drivers.map(d => {
        const nameClean = d.name.toLowerCase().trim();
        const lastName = d.name.split(" ")[0].toLowerCase();

        const states = days.map(day => {
            const dStart = new Date(day + "T00:00:00").getTime();
            const dEnd = new Date(day + "T23:59:59").getTime();

            const match = allEvents.find(e => {
                // 1. Zeit-Check
                const eStart = new Date(e.startDate.replace(" ","T")).getTime();
                const eEnd = new Date(e.endDate.replace(" ","T")).getTime();
                const inTime = (eStart <= dEnd && eEnd >= dStart);
                if(!inTime) return false;

                // 2. Namens-Check (wir suchen ALLES durch)
                const searchString = JSON.stringify(e).toLowerCase();
                return searchString.includes(nameClean) || searchString.includes(lastName);
            });
            return { day, busy: !!match, title: match ? match.title : "Frei" };
        });

        return { ...d, states, freeCount: states.filter(s => !s.busy).length };
    });

    ranking.sort((a,b) => b.freeCount - a.freeCount);
    render(ranking);
    logger.innerHTML += "✅ Analyse abgeschlossen.";
}

function render(list){
    document.getElementById("results").innerHTML = list.map(d => `
        <div class="driver ${d.freeCount==d.states.length?'all-free':(d.freeCount==0?'full-busy':'part-free')}">
            <div>
                <strong>${d.name}</strong>
                <div class="day-strip">
                    ${d.states.map(s => `<div class="day-box ${s.busy?'day-busy':'day-free'}" title="${s.title}">${s.day.split("-")[2]}</div>`).join("")}
                </div>
                <button onclick="openModal('${d.name}')" style="background:var(--green);color:#fff;padding:5px 10px;margin-top:8px;border-radius:8px;font-size:0.8rem;">BUCHEN</button>
            </div>
            <div style="font-weight:bold;">${d.freeCount}/${d.states.length} Frei</div>
        </div>`).join("");
}

function setup(){
    localStorage.setItem("kKey", prompt("API Key:"));
    localStorage.setItem("kIds", prompt("Kalender IDs:"));
    localStorage.setItem("gKey", prompt("Google Key (optional):"));
    location.reload();
}
function openModal(n){ document.getElementById('popDriver').value=n; document.getElementById('bookingModal').style.display='flex'; }
function closeModal(){ document.getElementById('bookingModal').style.display='none'; }
function confirmBooking(){ alert("Funktion in v53 aktiv. API wird aufgerufen..."); closeModal(); }
</script>
</body>
</html>
