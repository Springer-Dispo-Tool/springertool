<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Springer-Dispo v54.0 - DEBUG MODE</title>
<style>
    :root{ --blue:#2563eb; --green:#16a34a; --red:#dc2626; --bg:#eef2f7; }
    body{padding:20px;font-family:sans-serif;background:var(--bg);}
    .card{max-width:900px;margin:auto;background:#fff;padding:25px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1);}
    .log{margin-top:15px;padding:12px;background:#0f172a;color:#4ade80;border-radius:10px;font-family:monospace;font-size:0.8rem;white-space:pre-wrap;}
    button{width:100%;padding:15px;background:var(--blue);color:#fff;font-weight:bold;border:none;border-radius:12px;cursor:pointer;}
</style>
</head>
<body>

<div class="card">
    <h2>Springer-Dispo v54.0 (Diagnose-Modus)</h2>
    <p>Bitte Konsole mit <b>F12</b> öffnen, bevor du die Abfrage startest!</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
        <input type="date" id="dateFrom" value="2026-04-27">
        <input type="date" id="dateTo" value="2026-04-30">
    </div>
    <button onclick="run()">Abfrage starten & Daten loggen</button>
    <div id="log" class="log">Warte auf Start...</div>
</div>

<script>
async function run() {
    const kKey = localStorage.getItem("kKey");
    const kIds = localStorage.getItem("kIds");
    if (!kKey || !kIds) return alert("Bitte zuerst API Setup machen!");

    const logger = document.getElementById("log");
    const from = document.getElementById("dateFrom").value;
    const to = document.getElementById("dateTo").value;
    
    logger.innerHTML = "⏳ Lade Daten...\n";

    let allEvents = [];
    try {
        for (const id of kIds.split(",")) {
            const url = `https://api.kalender.digital/public/event?startDate=${from}&endDate=${to}&timeZone=Europe/Berlin`;
            const r = await fetch("https://corsproxy.io/?" + encodeURIComponent(url), {
                headers: { "X-API-KEY": kKey }
            });
            const data = await r.json();
            const events = data.events || data || [];
            allEvents.push(...events);
        }

        // HIER IST DIE DIAGNOSE FÜR CLAUDE
        if (allEvents.length > 0) {
            console.log("--- CLAUDE-DATEN-CHECK START ---");
            console.log("Hier ist das erste gefundene Event-Objekt:");
            console.log(JSON.stringify(allEvents[0], null, 2));
            console.log("--- CLAUDE-DATEN-CHECK ENDE ---");
            logger.innerHTML += "✅ Daten in die Konsole (F12) kopiert!\n";
        } else {
            logger.innerHTML += "⚠️ Keine Termine im Zeitraum gefunden.\n";
        }

    } catch (e) {
        logger.innerHTML += "❌ Fehler: " + e.message;
    }
}

function setup() {
    localStorage.setItem("kKey", prompt("API Key:"));
    localStorage.setItem("kIds", prompt("Kalender IDs:"));
}
// Falls noch kein Setup da ist
if(!localStorage.getItem("kKey")) setup();
</script>
</body>
</html>
