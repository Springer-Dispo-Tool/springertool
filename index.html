<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Springer-Dispo Pro v46.2</title>
<style>
:root{
--blue:#2563eb; --blue2:#1d4ed8; --green:#16a34a; --red:#dc2626;
--orange:#f59e0b; --bg:#eef2f7; --card:#ffffff; --text:#111827; --muted:#6b7280;
}
*{box-sizing:border-box}
body{margin:0;padding:20px;font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#eef2f7,#dbeafe);color:var(--text);}
.card{max-width:980px;margin:auto;background:rgba(255,255,255,.96);padding:26px;border-radius:24px;box-shadow:0 20px 50px rgba(0,0,0,.08);}
h2{margin:0 0 18px;text-align:center;color:var(--blue);font-size:1.8rem;}
label{display:block;margin:12px 0 6px;font-weight:700;font-size:.9rem;}
input,select,textarea{width:100%;padding:12px;border:1px solid #dbe3ee;border-radius:12px;font-size:1rem;background:#fff;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
button{border:none;border-radius:12px;cursor:pointer;font-weight:700;transition:.2s;}
.main-btn{width:100%;padding:15px;margin-top:15px;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;font-size:1rem;}
.setup-btn{width:100%;padding:10px;margin-top:10px;background:#f3f4f6;color:var(--muted);}
.log{margin-top:14px;padding:12px;background:#0f172a;color:#4ade80;font-family:monospace;border-radius:12px;font-size:.8rem;min-height:45px;}
#results{max-width:980px;margin:18px auto;}
.driver{background:#fff;padding:18px;border-radius:20px;margin-bottom:12px;display:flex;justify-content:space-between;gap:15px;align-items:center;box-shadow:0 8px 20px rgba(0,0,0,.05);border-left:10px solid #d1d5db;}
.driver.good{border-left-color:var(--green)}
.driver.mid{border-left-color:var(--orange)}
.driver.full{border-left-color:var(--red);background:#fff7f7}
.name{font-weight:800;font-size:1.1rem;margin-bottom:4px;}
.daybar{display:flex;gap:6px;margin-top:12px;}
.day{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;color:#fff;cursor:help;}
.free{background:var(--green)}
.busy{background:var(--red)}
.dist{font-size:1.2rem;font-weight:800;color:var(--blue);}
.book-btn{margin-top:12px;padding:10px 20px;background:var(--green);color:#fff;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center;z-index:999;}
.modal-box{background:#fff;width:95%;max-width:480px;padding:25px;border-radius:24px;}
</style>
</head>
<body>

<div class="card">
    <h2>Springer-Dispo Pro v46.2</h2>
    
    <label>Einrichtung wählen</label>
    <select id="schoolSelect" onchange="if(this.value) { document.getElementById('startPlz').value=this.value; }">
        <option value="">-- Bitte wählen --</option>
        <option value="30655">Albert-Liebmann-Schule (30655)</option>
        <option value="30165">Lebenshilfe Büttnerstraße (30165)</option>
        <option value="30900">Kindergarten Domino (30900)</option>
        <option value="30880">Freie Martinschule (30880)</option>
        <option value="30851">Kindergarten Langenhagen (30851)</option>
        <option value="30853">Gutzmann Schule (30853)</option>
        <option value="30926">Anne Frank Schule (30926)</option>
        <option value="30827">Ilmasi Schule (30827)</option>
        <option value="31535">Michael-Ende-Schule (31535)</option>
        <option value="31303">Schule am Wasserwerk (31303)</option>
    </select>

    <label>PLZ Startpunkt (für Kilometer-Ranking)</label>
    <input id="startPlz" value="30159">

    <div class="row">
        <div><label>Von</label><input type="date" id="dateFrom" value="2026-04-27"></div>
        <div><label>Bis</label><input type="date" id="dateTo" value="2026-04-30"></div>
    </div>

    <button class="main-btn" onclick="run()">Abfrage starten</button>
    <button class="setup-btn" onclick="setup()">⚙️ API Einstellungen</button>
    <div id="log" class="log">Bereit für Analyse...</div>
</div>

<div id="results"></div>

<div class="modal" id="bookModal">
    <div class="modal-box">
        <h3 style="margin-top:0">Tour eintragen</h3>
        <label>Fahrer</label>
        <input id="popDriver" readonly style="background:#f3f4f6">
        <label>Infos zur Tour</label>
        <textarea id="popDesc" rows="3" placeholder="z.B. Angela meldet: Vertretung für Tour XY"></textarea>
        <div style="display:flex;gap:10px;margin-top:20px;">
            <button onclick="closeModal()" style="flex:1;background:#eee;padding:12px;">Abbruch</button>
            <button onclick="confirmBooking()" style="flex:2;background:var(--blue);color:#fff;padding:12px;">Speichern</button>
        </div>
    </div>
</div>

<script>
const drivers = [
    {name:"Aschenbach André",plz:"30989"}, {name:"Ohm Lars",plz:"30559"},
    {name:"Bachmeier Reinhard",plz:"30659"}, {name:"Isfahan Mozaffaey Hamid",plz:"30519"},
    {name:"Otto Alexander",plz:"30173"}, {name:"Türkel Tuncer",plz:"30161"},
    {name:"Schrader Harald",plz:"30880"}, {name:"Neubauer Michael",plz:"30853"},
    {name:"Ferkau Eckart",plz:"30851"}, {name:"Bethmann Ekkehard",plz:"31535"},
    {name:"Hauer Frank",plz:"30900"}, {name:"Kruse Jens Roland",plz:"31275"},
    {name:"Grimpe Dirk",plz:"30827"}, {name:"Häge Klaus Dieter",plz:"30519"},
    {name:"Von Treskow Albrecht",plz:"30659"}, {name:"Giuseppe Caruso",plz:"30880"},
    {name:"Popescu Viorel Florinel",plz:"30827"}, {name:"Beka Jonel",plz:"31275"},
    {name:"Moser Siegfried",plz:"30827"}, {name:"Bodewell Thomas",plz:"30853"}
];

let loadedEvents = [];
let currentDriverName = "";

function clean(s){
    return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]/g,"");
}

function getDateRange(s, e){
    let a=[], d=new Date(s+"T00:00:00"), end=new Date(e+"T00:00:00");
    while(d <= end){ a.push(d.toISOString().split("T")[0]); d.setDate(d.getDate()+1); }
    return a;
}

async function run(){
    const kKey=localStorage.getItem("kKey"), kIds=localStorage.getItem("kIds"), gKey=localStorage.getItem("gKey");
    if(!kKey||!kIds||!gKey) return alert("Bitte Setup ausfüllen.");

    log("⏳ Lade Kalenderdaten...");
    loadedEvents = await loadEvents(dateFrom.value, dateTo.value, kIds, kKey);
    
    log("🗺️ Berechne Distanzen...");
    await loadGoogle(gKey);
    const matrix = await getDistances(startPlz.value);
    const days = getDateRange(dateFrom.value, dateTo.value);

    let ranking = drivers.map((d, i) => {
        const dayStates = days.map(day => checkBusy(d.name, day));
        const freeCount = dayStates.filter(x => !x.busy).length;
        const el = matrix.rows[i].elements[0];
        return { ...d, dayStates, freeCount, distText: el.status==="OK"?el.distance.text:"-", distVal: el.status==="OK"?el.distance.value:999999 };
    });

    ranking.sort((a,b) => (b.freeCount - a.freeCount) || (a.distVal - b.distVal));
    render(ranking);
    log("✅ Analyse abgeschlossen.");
}

async function loadEvents(f, t, ids, key){
    let all = [];
    for(const id of ids.split(",")){
        const url = `https://api.kalender.digital/public/event?calendarId=${id.trim()}&startDate=${f}&endDate=${t}T23:59:59&timeZone=Europe/Berlin&_=${Date.now()}`;
        const r = await fetch("https://corsproxy.io/?" + encodeURIComponent(url), {headers:{"X-API-KEY":key}});
        const data = await r.json();
        all.push(...(data.events || data || []));
    }
    return all;
}

function checkBusy(driver, day){
    const s = clean(driver);
    for(const ev of loadedEvents){
        const inSub = (ev.subCalendars||[]).some(sc => clean(sc).includes(s));
        const inTitle = clean(ev.title).includes(s);
        if(inSub || inTitle){
            const start = ev.startDate.split(" ")[0];
            const end = ev.endDate.split(" ")[0];
            if(day >= start && day <= end) return {busy:true, reason:ev.title};
        }
    }
    return {busy:false};
}

function render(list){
    results.innerHTML = list.map(d => {
        let cls = d.freeCount === 0 ? "full" : (d.freeCount === d.dayStates.length ? "good" : "mid");
        return `
        <div class="driver ${cls}">
            <div>
                <div class="name">${d.name}</div>
                <div style="font-size:0.85rem; color:#666">${d.plz}</div>
                <div class="daybar">
                    ${d.dayStates.map((x,idx) => `<div class="day ${x.busy?'busy':'free'}" title="${x.busy?x.reason:'Frei'}">${idx+27}</div>`).join('')}
                </div>
            </div>
            <div style="text-align:right">
                <div class="dist">${d.distText}</div>
                ${d.freeCount > 0 ? `<button class="book-btn" onclick="openModal('${d.name.replace(/'/g,"\\'")}')">BUCHEN</button>` : ''}
            </div>
        </div>`;
    }).join("");
}

function loadGoogle(k){ return new Promise(res => { if(window.google) return res(); const s=document.createElement("script"); s.src=`https://maps.googleapis.com/maps/api/js?key=${k}`; s.onload=res; document.head.appendChild(s); }); }
function getDistances(dest){ return new Promise(res => { new google.maps.DistanceMatrixService().getDistanceMatrix({origins:drivers.map(d=>d.plz),destinations:[dest],travelMode:'DRIVING'}, r => res(r)); }); }
function log(t){ document.getElementById("log").textContent=t; }
function setup(){ localStorage.setItem("kKey",prompt("Kalender Key:",localStorage.getItem("kKey")||"")); localStorage.setItem("kIds",prompt("Kalender IDs:",localStorage.getItem("kIds")||"")); localStorage.setItem("gKey",prompt("Google Key:",localStorage.getItem("gKey")||"")); location.reload(); }
function openModal(n){ currentDriverName=n; popDriver.value=n; bookModal.style.display="flex"; }
function closeModal(){ bookModal.style.display="none"; }

async function confirmBooking(){
    const payload = {
        startDate: dateFrom.value + " 00:00:00", endDate: dateTo.value + " 23:59:59",
        title: schoolSelect.selectedOptions[0].text, description: popDesc.value,
        wholeDay: true, subCalendars: [currentDriverName], timeZone: "Europe/Berlin"
    };
    const r = await fetch("https://corsproxy.io/?" + encodeURIComponent("https://api.kalender.digital/public/event"), {
        method:"POST", headers:{"Content-Type":"application/json","X-API-KEY":localStorage.getItem("kKey")}, body:JSON.stringify(payload)
    });
    if(r.ok) { closeModal(); run(); alert("✅ Eingetragen!"); }
}
</script>
</body>
</html>
