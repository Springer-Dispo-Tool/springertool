<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Springer-Dispo Pro v45.13 FIX</title>

<style>
:root{
--blue:#2563eb;
--green:#16a34a;
--red:#dc2626;
--orange:#f59e0b;
--bg:#eef2f7;
--text:#111827;
}

*{box-sizing:border-box;}

body{
margin:0;
padding:20px;
font-family:Segoe UI,Arial,sans-serif;
background:var(--bg);
color:var(--text);
}

.card{
max-width:920px;
margin:auto;
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h2{
margin-top:0;
text-align:center;
color:var(--blue);
}

label{
display:block;
margin:10px 0 5px;
font-weight:700;
}

input,select,textarea{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:10px;
font-size:1rem;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

button{
border:none;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

.main-btn{
width:100%;
padding:15px;
margin-top:15px;
background:var(--blue);
color:#fff;
}

.book-btn{
padding:8px 14px;
background:var(--green);
color:#fff;
margin-top:8px;
}

.log{
margin-top:15px;
padding:12px;
background:#0f172a;
color:#4ade80;
font-family:monospace;
border-radius:10px;
font-size:.82rem;
min-height:50px;
}

#results{
max-width:920px;
margin:20px auto;
}

.driver{
background:#fff;
padding:15px;
border-radius:15px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
border-left:8px solid #ccc;
box-shadow:0 5px 15px rgba(0,0,0,.05);
}

.free{border-left-color:var(--green);}
.partial{border-left-color:var(--orange);}
.busy{
border-left-color:var(--red);
background:#fff5f5;
}

.day-bar{
display:flex;
gap:4px;
flex-wrap:wrap;
margin-top:8px;
}

.day-dot{
width:26px;
height:26px;
border-radius:7px;
display:flex;
align-items:center;
justify-content:center;
font-size:11px;
font-weight:700;
color:#fff;
}

.dot-free{background:var(--green);}
.dot-busy{background:var(--red);}

.modal-overlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
z-index:2000;
justify-content:center;
align-items:center;
}

.modal-box{
background:#fff;
padding:24px;
border-radius:18px;
width:92%;
max-width:420px;
}
</style>
</head>

<body>

<div class="card">
<h2>Springer-Dispo Pro v45.13 FIX</h2>

<label>Einrichtung</label>
<select id="schoolSelect" onchange="if(this.value)startPlz.value=this.value">
<option value="">-- Wählen --</option>
<option value="30655">Albert-Liebmann-Schule (30655)</option>
<option value="30165">Lebenshilfe Büttnerstraße (30165)</option>
<option value="30900">Kindergarten Domino (30900)</option>
<option value="30880">Freie Martinschule (30880)</option>
<option value="30851">Kindergarten Langenhagen (30851)</option>
<option value="30629">Kindergarten Misburg (30629)</option>
<option value="31535">Michael-Ende-Schule (31535)</option>
<option value="31515">Paul-Moor-Schule (31515)</option>
<option value="30938">Pestalozzi-Schule (30938)</option>
<option value="30853">Gutzmann Schule (30853)</option>
<option value="30926">Anne Frank Schule (30926)</option>
<option value="30827">Ilmasi Schule (30827)</option>
</select>

<label>PLZ Start</label>
<input id="startPlz" value="30159">

<div class="row">
<div>
<label>Von</label>
<input type="date" id="dateFrom" value="2026-04-27">
</div>
<div>
<label>Bis</label>
<input type="date" id="dateTo" value="2026-04-30">
</div>
</div>

<button class="main-btn" onclick="run()">Prüfen & Ranking</button>
<button style="width:100%;margin-top:10px;padding:8px;background:#eee;" onclick="setup()">⚙️ Setup</button>

<div id="log" class="log">Bereit.</div>
</div>

<div id="results"></div>

<div id="bookingModal" class="modal-overlay">
<div class="modal-box">
<h3>Buchung</h3>
<input id="popDriver" readonly style="background:#f3f4f6;margin-bottom:10px;">
<textarea id="popDesc" placeholder="Info"></textarea>

<div style="display:flex;gap:10px;margin-top:15px;">
<button onclick="closeModal()" style="flex:1;background:#eee;">Abbruch</button>
<button onclick="confirmBooking()" style="flex:2;background:var(--blue);color:#fff;">Buchen</button>
</div>
</div>
</div>

<script>
const drivers = [
{name:"Aschenbach André",plz:"30989"},
{name:"Ohm Lars",plz:"30559"},
{name:"Bachmeier Reinhard",plz:"30659"},
{name:"Isfahan Mozaffaey Hamid",plz:"30519"},
{name:"Otto Alexander",plz:"30173"},
{name:"Türkel Tuncer",plz:"30161"},
{name:"Schrader Harald",plz:"30880"},
{name:"Neubauer Michael",plz:"30853"},
{name:"Ferkau Eckart",plz:"30851"},
{name:"Bethmann Ekkehard",plz:"31535"},
{name:"Hauer Frank",plz:"30900"},
{name:"Kruse Jens Roland",plz:"31275"},
{name:"Grimpe Dirk",plz:"30827"},
{name:"Häge Klaus  Dieter",plz:"30519"},
{name:"Von Treskow Albrecht",plz:"30659"},
{name:"Giuseppe Caruso",plz:"30880"},
{name:"Popescu Viorel Florinel",plz:"30827"},
{name:"Beka Jonel",plz:"31275"},
{name:"Moser Siegfried",plz:"30827"},
{name:"Bodewell Thomas",plz:"30853"}
];

let loadedEvents=[];
let currentDriver="";

function clean(str){
return (str || "")
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^a-z0-9 ]/g," ")
.replace(/\s+/g," ")
.trim();
}

function parts(name){
return clean(name).split(" ").filter(x=>x.length>2);
}

async function run(){
try{
const kKey=localStorage.getItem("kKey");
const kIds=localStorage.getItem("kIds");
const gKey=localStorage.getItem("gKey");

if(!kKey || !kIds || !gKey) return alert("Bitte Setup ausfüllen.");

log("⏳ Lade Kalender...");
loadedEvents=await loadEvents(dateFrom.value,dateTo.value,kIds,kKey);

await loadGoogle(gKey);

log("📏 Berechne...");
const matrix=await getDistances(startPlz.value);
const range=getDateRange(dateFrom.value,dateTo.value);

let ranking=drivers.map((d,i)=>{

const dayStates=range.map(day=>{

const hit=loadedEvents.find(ev=>{

if(!sameDay(ev,day)) return false;

const txt=clean(
(ev.title||"")+" "+
(ev.description||"")+" "+
(ev.who||"")+" "+
((ev.subCalendars||[]).join(" "))
);

const p=parts(d.name);
return p.every(w=>txt.includes(w));
});

return {
date:day,
busy:!!hit,
reason:hit ? hit.title : ""
};

});

const el=matrix.rows[i].elements[0];

return{
...d,
dayStates,
freeCount:dayStates.filter(x=>!x.busy).length,
distText:el.status==="OK"?el.distance.text:"-",
distVal:el.status==="OK"?el.distance.value:999999
};

});

ranking.sort((a,b)=>(b.freeCount-a.freeCount)||(a.distVal-b.distVal));

render(ranking);

log("✅ Fertig.");
}catch(e){
log("❌ "+e.message);
}
}

function sameDay(ev,day){
const s=(ev.startDate||"").substring(0,10);
const e=(ev.endDate||"").substring(0,10);
return day>=s && day<=e;
}

async function loadEvents(f,t,ids,key){
let all=[];

for(const id of ids.split(",")){
const url=`https://api.kalender.digital/public/event?calendarId=${id.trim()}&startDate=${f}&endDate=${t}T23:59:59&timeZone=Europe/Berlin&_=${Date.now()}`;

const r=await fetch("https://corsproxy.io/?"+encodeURIComponent(url),{
headers:{"X-API-KEY":key}
});

if(!r.ok) continue;

const d=await r.json();
all.push(...(d.events || d || []));
}

return all;
}

function render(list){
results.innerHTML=list.map(d=>{

let cls="busy";
if(d.freeCount===d.dayStates.length) cls="free";
else if(d.freeCount>0) cls="partial";

return `
<div class="driver ${cls}">
<div>
<strong>${d.name}</strong>

<div class="day-bar">
${d.dayStates.map(s=>`
<div class="day-dot ${s.busy?'dot-busy':'dot-free'}">
${s.date.split('-')[2]}
</div>
`).join("")}
</div>

${d.freeCount>0 ? `<button class="book-btn" onclick="openModal('${d.name.replace(/'/g,"\\'")}')">BUCHEN</button>` : ""}

</div>

<div style="font-weight:700;">${d.distText}</div>
</div>
`;

}).join("");
}

function log(t){
document.getElementById("log").textContent=t;
}

function setup(){
localStorage.setItem("kKey",prompt("API Key:",localStorage.getItem("kKey")||""));
localStorage.setItem("kIds",prompt("Kalender IDs:",localStorage.getItem("kIds")||""));
localStorage.setItem("gKey",prompt("Google Key:",localStorage.getItem("gKey")||""));
location.reload();
}

function loadGoogle(key){
return new Promise(resolve=>{
if(window.google) return resolve();
const s=document.createElement("script");
s.src=`https://maps.googleapis.com/maps/api/js?key=${key}`;
s.onload=resolve;
document.head.appendChild(s);
});
}

function getDistances(dest){
return new Promise(resolve=>{
new google.maps.DistanceMatrixService().getDistanceMatrix({
origins:drivers.map(d=>d.plz),
destinations:[dest],
travelMode:"DRIVING"
},res=>resolve(res));
});
}

function getDateRange(a,b){
let x=new Date(a), y=new Date(b), out=[];
while(x<=y){
out.push(x.toISOString().split("T")[0]);
x.setDate(x.getDate()+1);
}
return out;
}

function openModal(n){
currentDriver=n;
popDriver.value=n;
bookingModal.style.display="flex";
}

function closeModal(){
bookingModal.style.display="none";
}

async function confirmBooking(){

const payload={
startDate:dateFrom.value+" 00:00:00",
endDate:dateTo.value+" 23:59:59",
title:schoolSelect.selectedOptions[0].text,
description:popDesc.value,
wholeDay:true,
subCalendars:[currentDriver],
timeZone:"Europe/Berlin"
};

closeModal();

const r=await fetch("https://corsproxy.io/?"+encodeURIComponent("https://api.kalender.digital/public/event"),{
method:"POST",
headers:{
"Content-Type":"application/json",
"X-API-KEY":localStorage.getItem("kKey")
},
body:JSON.stringify(payload)
});

if(r.ok){
alert("Gebucht");
run();
}
}
</script>
</body>
</html>
