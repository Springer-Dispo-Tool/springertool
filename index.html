<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Springer-Dispo Pro v62.0</title>
<style>
:root{ --blue:#2563eb; --green:#16a34a; --red:#dc2626; --orange:#f59e0b; --bg:#eef2f7; --text:#111827; --line:#e5e7eb; }
body{margin:0;padding:20px;font-family:Segoe UI,sans-serif;background:linear-gradient(135deg,#eef2f7,#dbeafe);color:var(--text);}
.card{max-width:920px;margin:auto;background:#fff;padding:26px;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.10);}
h2{margin:0 0 18px;text-align:center;color:var(--blue);}
label{display:block;margin:12px 0 6px;font-weight:700;}
input,select,textarea{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;box-sizing:border-box;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
button{border:none;border-radius:12px;cursor:pointer;font-weight:700;transition:.2s;}
.main-btn{width:100%;padding:15px;background:var(--blue);color:#fff;font-size:1rem;margin-top:10px;}
.log{margin-top:14px;padding:14px;background:#0f172a;color:#4ade80;font-family:monospace;border-radius:14px;font-size:.85rem;min-height:60px;white-space:pre-wrap;}
.driver{background:#fff;padding:16px;border-radius:18px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 8px 20px rgba(0,0,0,0.06);border-left:8px solid #ccc;}
.all-free{border-left-color:var(--green);}
.part-free{border-left-color:var(--orange);}
.full-busy{border-left-color:var(--red);}
.day-strip{display:flex;gap:5px;margin:8px 0;}
.day-box{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:bold;color:#fff;cursor:help;}
.day-free{background:var(--green);}
.day-busy{background:var(--red);}
.right-info{text-align:right;min-width:100px;}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:2000;justify-content:center;align-items:center;backdrop-filter:blur(4px);}
.modal-box{background:#fff;padding:25px;border-radius:20px;width:95%;max-width:450px;}
</style>
</head>
<body>

<div class="card">
    <h2>Springer-Dispo Pro v62.0</h2>
    
    <label>Einrichtung / Ziel</label>
    <select id="schoolSelect" onchange="if(this.value) document.getElementById('startPlz').value = this.value;">
        <option value="">-- Wählen --</option>
        <option value="30655">Albert-Liebmann-Schule (30655)</option>
        <option value="30827">Ilmasi Schule (30827)</option>
        <option value="30853">Gutzmann Schule (30853)</option>
        <option value="31535">Michael-Ende-Schule (31535)</option>
        <option value="30165">Stötzner-Schule (30165)</option>
    </select>

    <label>PLZ Startpunkt</label>
    <input id="startPlz" value="30159">

    <div class="row">
        <div><label>Von</label><input type="date" id="dateFrom" value="2026-04-27"></div>
        <div><label>Bis</label><input type="date" id="dateTo" value="2026-04-30"></div>
    </div>

    <button class="main-btn" onclick="run()">Verfügbarkeit & Ranking prüfen</button>
    <button onclick="setup()" style="width:100%;background:#f3f4f6;padding:10px;margin-top:10px;border-radius:12px;">⚙️ API Setup</button>
    <div id="log" class="log">Bereit.</div>
</div>

<div id="results" style="margin-top:20px;max-width:920px;margin:auto;"></div>

<div id="bookingModal" class="modal-overlay">
    <div class="modal-box">
        <h3>Tour buchen</h3>
        <input type="text" id="popDriver" readonly style="background:#f3f4f6">
        <div class="row">
            <select id="nameSelect"><option value="Angela">Angela</option><option value="Christoph">Christoph</option></select>
            <select id="tourSelect"></select>
        </div>
        <textarea id="popDesc" rows="2" placeholder="Zusatz-Info"></textarea>
        <button onclick="confirmBooking()" style="background:var(--blue);color:#fff;width:100%;padding:12px;margin-top:10px;">Eintragen</button>
        <button onclick="closeModal()" style="background:#eee;width:100%;padding:10px;margin-top:5px;">Abbruch</button>
    </div>
</div>

<script>
const drivers = [
    {name:"Aschenbach André",plz:"30989"},{name:"Ohm Lars",plz:"30559"},{name:"Bachmeier Reinhard",plz:"30659"},
    {name:"Isfahan Mozaffaey Hamid",plz:"30519"},{name:"Otto Alexander",plz:"30173"},{name:"Türkel Tuncer",plz:"30161"},
    {name:"Schrader Harald",plz:"30880"},{name:"Neubauer Michael",plz:"30853"},{name:"Ferkau Eckart",plz:"30851"},
    {name:"Bethmann Ekkehard",plz:"31535"},{name:"Hauer Frank",plz:"30900"},{name:"Kruse Jens Roland",plz:"31275"},
    {name:"Grimpe Dirk",plz:"30827"},{name:"Häge Klaus Dieter",plz:"30519"},{name:"Von Treskow Albrecht",plz:"30659"},
    {name:"Giuseppe Caruso",plz:"30880"},{name:"Popescu Viorel Florinel",plz:"30827"},{name:"Beka Jonel",plz:"31275"},
    {name:"Moser Siegfried",plz:"30827"},{name:"Bodewell Thomas",plz:"30853"}
];

let currentDriver = "";

window.onload = () => {
    const ts = document.getElementById('tourSelect');
    for(let i=1;i<=40;i++) {
        let o = document.createElement('option'); o.value = "Tour "+i; o.innerText = "Tour "+i; ts.appendChild(o);
    }
};

function setup() {
    localStorage.setItem("kKey", prompt("Kalender API Key:", localStorage.getItem("kKey")||""));
    localStorage.setItem("kIds", prompt("Kalender IDs:", localStorage.getItem("kIds")||""));
    localStorage.setItem("gKey", prompt("Google API Key:", localStorage.getItem("gKey")||""));
    location.reload();
}

async function run() {
    const kKey = localStorage.getItem("kKey"), kIds = localStorage.getItem("kIds"), gKey = localStorage.getItem("gKey");
    if (!kKey || !kIds || !gKey) return alert("Setup unvollständig!");

    const logger = document.getElementById("log");
    const from = document.getElementById("dateFrom").value;
    const to = document.getElementById("dateTo").value;
    const startPlz = document.getElementById("startPlz").value;

    logger.innerHTML = "📅 Lade Daten & berechne Wege...\n";

    // 1. Google Maps Matrix laden
    let distances = {};
    try {
        const matrix = await getDistances(startPlz, gKey);
        drivers.forEach((d, i) => {
            const el = matrix.rows[i].elements[0];
            distances[d.name] = el.status === "OK" ? { text: el.distance.text, val: el.distance.value } : { text: "-", val: 999999 };
        });
    } catch(e) { logger.innerHTML += "⚠️ Google Maps Fehler\n"; }

    // 2. Kalender laden
    let allEvents = [];
    for (const id of kIds.split(",")) {
        const url = `https://api.kalender.digital/public/event?startDate=${from}&endDate=${to}T23:59:59&timeZone=Europe/Berlin`;
        const r = await fetch("https://corsproxy.io/?" + encodeURIComponent(url), { headers: { "X-API-KEY": kKey } });
        const data = await r.json();
        allEvents.push(...(data.events || data || []));
    }

    // 3. Tage generieren
    let days = [];
    let cur = new Date(from);
    while (cur <= new Date(to)) {
        days.push(cur.toISOString().split('T')[0]);
        cur.setDate(cur.getDate() + 1);
    }

    // 4. Ranking erstellen
    const ranking = drivers.map(d => {
        const lastName = d.name.split(" ")[0].toLowerCase().trim();
        const states = days.map(day => {
            const match = allEvents.find(e => {
                const eStart = e.startDate.split(" ")[0], eEnd = e.endDate.split(" ")[0];
                const inRange = day >= eStart && day <= eEnd;
                const nameInTitle = (e.title || "").toLowerCase().includes(lastName);
                const nameInSub = (e.subCalendars || []).some(s => String(s).toLowerCase().includes(lastName));
                return inRange && (nameInTitle || nameInSub);
            });
            return { day, busy: !!match, title: match ? match.title : "Frei" };
        });
        return { ...d, states, dist: distances[d.name], freeCount: states.filter(s => !s.busy).length };
    });

    ranking.sort((a, b) => {
        if (a.freeCount === 0 && b.freeCount > 0) return 1;
        if (b.freeCount === 0 && a.freeCount > 0) return -1;
        return a.dist.val - b.dist.val;
    });

    render(ranking);
    logger.innerHTML += "✅ Analyse abgeschlossen.";
}

function getDistances(start, key) {
    return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = `https://maps.googleapis.com/maps/api/js?key=${key}&callback=initMap`;
        window.initMap = () => {
            new google.maps.DistanceMatrixService().getDistanceMatrix({
                origins: drivers.map(d => d.plz), destinations: [start], travelMode: "DRIVING"
            }, (res, stat) => stat === "OK" ? resolve(res) : reject());
        };
        document.head.appendChild(s);
    });
}

function render(list) {
    document.getElementById("results").innerHTML = list.map(d => `
        <div class="driver ${d.freeCount == d.states.length ? 'all-free' : (d.freeCount == 0 ? 'full-busy' : 'part-free')}">
            <div>
                <strong>${d.name}</strong> <span style="font-size:0.8rem; color:#666;">(${d.plz})</span>
                <div class="day-strip">
                    ${d.states.map(s => `<div class="day-box ${s.busy ? 'day-busy' : 'day-free'}" title="${s.title}">${s.day.split("-")[2]}</div>`).join("")}
                </div>
                <button onclick="openModal('${d.name.replace(/'/g,"")}')" style="background:var(--green);color:#fff;padding:6px 12px;border-radius:8px;font-size:0.8rem;">BUCHEN</button>
            </div>
            <div class="right-info">
                <div style="font-weight:800; font-size:1.1rem;">${d.dist.text}</div>
                <div style="font-size:0.75rem;">${d.freeCount}/${d.states.length} Tage frei</div>
            </div>
        </div>`).join("");
}

function openModal(n) { currentDriver = n; document.getElementById('popDriver').value = n; document.getElementById('bookingModal').style.display = 'flex'; }
function closeModal() { document.getElementById('bookingModal').style.display = 'none'; }

async function confirmBooking() {
    const kKey = localStorage.getItem("kKey"), from = document.getElementById("dateFrom").value, to = document.getElementById("dateTo").value;
    const school = document.getElementById('schoolSelect').selectedOptions[0].text;
    const desc = document.getElementById('popDesc').value + " (" + document.getElementById('tourSelect').value + ")";
    
    const payload = {
        startDate: `${from} 00:00:00`, endDate: `${to} 23:59:59`,
        timeZone: "Europe/Berlin", title: school, description: desc, wholeDay: true, subCalendars: [currentDriver]
    };

    closeModal();
    const r = await fetch("https://corsproxy.io/?" + encodeURIComponent("https://api.kalender.digital/public/event"), {
        method: "POST", headers: { "Content-Type": "application/json", "X-API-KEY": kKey }, body: JSON.stringify(payload)
    });
    if (r.ok) { alert("✅ Eingetragen!"); run(); }
}
</script>
</body>
</html>
