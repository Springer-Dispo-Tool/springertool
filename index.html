<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Springer-Dispo Pro v47 FINAL MASTER</title>

<style>
:root{
--blue:#2563eb;
--blue2:#1d4ed8;
--green:#16a34a;
--green2:#15803d;
--red:#dc2626;
--orange:#f59e0b;
--bg:#eef2f7;
--line:#e5e7eb;
--text:#111827;
--muted:#6b7280;
}
*{box-sizing:border-box}
body{
margin:0;
padding:22px;
font-family:Segoe UI,Arial,sans-serif;
background:linear-gradient(135deg,#eef2f7,#dbeafe);
color:var(--text);
}
.card{
max-width:940px;
margin:auto;
background:#fff;
padding:26px;
border-radius:24px;
box-shadow:0 20px 60px rgba(0,0,0,.10);
}
h2{
margin:0 0 18px;
text-align:center;
color:var(--blue);
}
label{
display:block;
margin:12px 0 6px;
font-weight:700;
font-size:.92rem;
}
input,select,textarea{
width:100%;
padding:12px;
border:1px solid var(--line);
border-radius:12px;
font-size:1rem;
}
.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}
button{
border:none;
border-radius:12px;
cursor:pointer;
font-weight:700;
transition:.2s;
}
button:hover{transform:translateY(-1px)}
.main-btn{
width:100%;
padding:15px;
margin-top:14px;
background:linear-gradient(135deg,var(--blue),var(--blue2));
color:#fff;
}
.setup-btn{
width:100%;
padding:12px;
margin-top:10px;
background:#f3f4f6;
}
.book-btn{
padding:10px 14px;
background:linear-gradient(135deg,var(--green),var(--green2));
color:#fff;
margin-top:8px;
}
.del-btn{
padding:10px 14px;
background:#fff;
color:var(--red);
border:1px solid #fecaca;
margin-top:8px;
}
.log{
margin-top:14px;
padding:14px;
background:#0f172a;
color:#4ade80;
font-family:Consolas,monospace;
border-radius:14px;
font-size:.85rem;
min-height:58px;
white-space:pre-wrap;
}
#results{
max-width:940px;
margin:18px auto;
}
.driver{
background:#fff;
padding:16px;
border-radius:18px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
gap:15px;
align-items:center;
box-shadow:0 8px 20px rgba(0,0,0,.06);
border-left:8px solid #d1d5db;
}
.driver.free{border-left-color:var(--green)}
.driver.mix{border-left-color:var(--orange)}
.driver.busy{border-left-color:var(--red);background:#fff7f7}
.small{font-size:.86rem;color:var(--muted)}
.right{
min-width:130px;
text-align:right;
font-size:1.08rem;
font-weight:800;
}
.daybar{
display:flex;
gap:4px;
flex-wrap:wrap;
margin:8px 0;
}
.day{
width:28px;
height:28px;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-size:.75rem;
font-weight:800;
color:#fff;
}
.day.free{background:var(--green)}
.day.busy{background:var(--red)}
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
justify-content:center;
align-items:center;
padding:18px;
z-index:999;
}
.modal-box{
background:#fff;
width:100%;
max-width:520px;
padding:24px;
border-radius:22px;
}
.modal-actions{
display:flex;
gap:10px;
margin-top:18px;
}
.cancel-btn{
flex:1;
padding:12px;
background:#e5e7eb;
}
.save-btn{
flex:2;
padding:12px;
background:linear-gradient(135deg,var(--blue),var(--blue2));
color:#fff;
}
@media(max-width:760px){
.row{grid-template-columns:1fr}
.driver{flex-direction:column;align-items:flex-start}
.right{text-align:left}
}
</style>
</head>

<body>

<div class="card">

<h2>Springer-Dispo Pro v47 FINAL MASTER</h2>

<label>Einrichtung / Ziel</label>
<select id="schoolSelect">
<option value="">-- Einrichtung wählen --</option>
<option value="30655">Albert-Liebmann-Schule (30655)</option>
<option value="30165">Lebenshilfe Büttnerstraße (30165)</option>
<option value="30853">Gutzmann Schule (30853)</option>
<option value="30827">Ilmasi Schule (30827)</option>
<option value="30900">Kindergarten Domino (30900)</option>
</select>

<label>PLZ erstes Kind / Startpunkt</label>
<input id="startPlz" value="30159">

<div class="row">
<div>
<label>Von Datum</label>
<input type="date" id="dateFrom">
</div>
<div>
<label>Bis Datum</label>
<input type="date" id="dateTo">
</div>
</div>

<button class="main-btn" onclick="run()">Verfügbarkeit & Ranking prüfen</button>
<button class="setup-btn" onclick="setup()">⚙️ API Einstellungen</button>

<div id="log" class="log">Bereit.</div>

</div>

<div id="results"></div>

<div class="modal" id="bookModal">
<div class="modal-box">

<h3 style="margin-top:0;">Fahrer buchen</h3>

<label>Fahrer</label>
<input id="popDriver" readonly>

<label>Info</label>
<textarea id="popDesc" rows="3"></textarea>

<div class="modal-actions">
<button class="cancel-btn" onclick="closeModal()">Abbruch</button>
<button class="save-btn" onclick="confirmBooking()">Eintragen</button>
</div>

</div>
</div>

<script>
const drivers = [
{name:"Aschenbach André",plz:"30989"},
{name:"Ohm Lars",plz:"30559"},
{name:"Bachmeier Reinhard",plz:"30659"},
{name:"Isfahan Mozaffaey Hamid",plz:"30519"},
{name:"Otto Alexander",plz:"30173"},
{name:"Türkel Tuncer",plz:"30161"},
{name:"Schrader Harald",plz:"30880"},
{name:"Neubauer Michael",plz:"30853"},
{name:"Ferkau Eckart",plz:"30851"},
{name:"Bethmann Ekkehard",plz:"31535"},
{name:"Hauer Frank",plz:"30900"},
{name:"Kruse Jens Roland",plz:"31275"},
{name:"Grimpe Dirk",plz:"30827"},
{name:"Häge Klaus Dieter",plz:"30519"},
{name:"Von Treskow Albrecht",plz:"30659"},
{name:"Giuseppe Caruso",plz:"30880"},
{name:"Popescu Viorel Florinel",plz:"30827"},
{name:"Beka Jonel",plz:"31275"},
{name:"Moser Siegfried",plz:"30827"},
{name:"Bodewell Thomas",plz:"30853"}
];

let loadedEvents=[];
let currentDriver="";

window.onload=()=>{
const today=new Date().toISOString().slice(0,10);
dateFrom.value=today;
dateTo.value=today;

schoolSelect.onchange=function(){
if(this.value) startPlz.value=this.value;
};
};

function log(t){
document.getElementById("log").textContent=t;
}

function setup(){
localStorage.setItem("kKey",prompt("Kalender API Key:",localStorage.getItem("kKey")||""));
localStorage.setItem("kIds",prompt("Kalender IDs:",localStorage.getItem("kIds")||""));
localStorage.setItem("gKey",prompt("Google API Key:",localStorage.getItem("gKey")||""));
location.reload();
}

function normalize(s){
return (s||"")
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^a-z0-9]/g,"");
}

function dateRange(from,to){
let out=[];
let d=new Date(from+"T12:00:00");
let end=new Date(to+"T12:00:00");

while(d<=end){
let y=d.getFullYear();
let m=String(d.getMonth()+1).padStart(2,"0");
let da=String(d.getDate()).padStart(2,"0");
out.push(`${y}-${m}-${da}`);
d.setDate(d.getDate()+1);
}
return out;
}

async function run(){
try{
const kKey=localStorage.getItem("kKey");
const kIds=localStorage.getItem("kIds");
const gKey=localStorage.getItem("gKey");

if(!kKey||!kIds||!gKey) return alert("Bitte Setup ausfüllen.");

const from=dateFrom.value;
const to=dateTo.value;
const start=startPlz.value;

log("📅 Kalender laden...");
loadedEvents=await loadEvents(from,to,kIds,kKey);

log("🗺️ Google laden...");
await loadGoogle(gKey);

log("📏 Ranking berechnen...");
const matrix=await getDistances(start);

const days=dateRange(from,to);

let ranking=drivers.map((d,i)=>{

const states=days.map(day=>{
const busy=loadedEvents.some(ev=>{
const sub=(ev.subCalendars||[]).join(" ");
if(normalize(sub).includes(normalize(d.name))===false) return false;

const evFrom=(ev.startDate||"").slice(0,10);
const evTo=(ev.endDate||"").slice(0,10);

return day>=evFrom && day<=evTo;
});

return {day,busy};
});

const freeCount=states.filter(x=>!x.busy).length;

const el=matrix.rows[i].elements[0];

return{
...d,
states,
freeCount,
distText:el.status==="OK"?el.distance.text:"-",
distVal:el.status==="OK"?el.distance.value:999999
};
});

ranking.sort((a,b)=>(b.freeCount-a.freeCount)||(a.distVal-b.distVal));

render(ranking);

log("✅ Fertig.");

}catch(e){
log("❌ "+e.message);
}
}

async function loadEvents(from,to,kIds,kKey){
let all=[];

for(const raw of kIds.split(",")){
const id=raw.trim();

const url=`https://api.kalender.digital/public/event?calendarId=${id}&startDate=${from}&endDate=${to}T23:59:59&timeZone=Europe/Berlin&x=${Date.now()}`;
const proxy="https://corsproxy.io/?"+encodeURIComponent(url);

const r=await fetch(proxy,{headers:{"X-API-KEY":kKey}});
if(!r.ok) continue;

const data=await r.json();

if(Array.isArray(data)) all.push(...data);
else if(Array.isArray(data.events)) all.push(...data.events);
}
return all;
}

function loadGoogle(key){
return new Promise(resolve=>{
if(window.google) return resolve();
const s=document.createElement("script");
s.src=`https://maps.googleapis.com/maps/api/js?key=${key}`;
s.onload=resolve;
document.head.appendChild(s);
});
}

function getDistances(start){
return new Promise((resolve,reject)=>{
new google.maps.DistanceMatrixService().getDistanceMatrix({
origins:drivers.map(d=>d.plz),
destinations:[start],
travelMode:"DRIVING"
},(res,status)=>{
if(status!=="OK") return reject(new Error("Google Fehler"));
resolve(res);
});
});
}

function render(list){
results.innerHTML=list.map(d=>{

let cls="busy";
if(d.freeCount===d.states.length) cls="free";
else if(d.freeCount>0) cls="mix";

return `
<div class="driver ${cls}">
<div>
<strong>${d.name}</strong><br>
<div class="small">${d.plz}</div>

<div class="daybar">
${d.states.map(s=>`
<div class="day ${s.busy?'busy':'free'}">
${s.day.slice(8,10)}
</div>`).join("")}
</div>

<div class="small">Freie Tage: ${d.freeCount} / ${d.states.length}</div>

${d.freeCount>0?`<button class="book-btn" onclick="openModal('${d.name.replace(/'/g,"\\'")}')">BUCHEN</button>`:""}

</div>

<div class="right">${d.distText}</div>
</div>
`;
}).join("");
}

function openModal(name){
currentDriver=name;
popDriver.value=name;
bookModal.style.display="flex";
}

function closeModal(){
bookModal.style.display="none";
}

async function confirmBooking(){
try{
const kKey=localStorage.getItem("kKey");

const payload={
startDate:`${dateFrom.value} 00:00:00`,
endDate:`${dateTo.value} 23:59:59`,
timeZone:"Europe/Berlin",
title:schoolSelect.selectedOptions[0].text,
description:popDesc.value,
wholeDay:true,
subCalendars:[currentDriver]
};

const proxy="https://corsproxy.io/?"+encodeURIComponent("https://api.kalender.digital/public/event");

const r=await fetch(proxy,{
method:"POST",
headers:{
"Content-Type":"application/json",
"X-API-KEY":kKey
},
body:JSON.stringify(payload)
});

if(!r.ok) throw new Error("Buchung fehlgeschlagen");

closeModal();
alert("✅ Gebucht");
run();

}catch(e){
alert("❌ "+e.message);
}
}
</script>
</body>
</html>
